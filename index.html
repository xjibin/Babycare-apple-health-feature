<style>
  :root{
    --card:#1C1C1E; --card2:#2C2C2E; --hair:#2C2C2E; --sub:#98989F;
    --blue:#3D82F7; --pink:#FF6482; --red:#FF453A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:#0B0B0C; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",sans-serif;
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;}
  button{appearance:none; border:0; background:none; color:inherit; font:inherit; padding:0; text-align:inherit;
    -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; touch-action:manipulation;}
  .press:active{transform:scale(.96); transition:transform .08s;}
  svg{flex:none; display:block;}
  .num{font-variant-numeric:tabular-nums;}

  /* ---- phone frame (desktop / preview) ---- */
  .stage{min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 0;}
  .phone{position:relative; overflow:hidden; width:393px; height:852px; border-radius:54px; background:#000;
    border:1px solid #2A2A2C; box-shadow:0 30px 80px rgba(0,0,0,.7); -webkit-user-select:none; user-select:none;}
  .caption{margin-top:16px; color:#6B6B70; font-size:12px;}
  .statusbar{position:absolute; top:0; left:0; right:0; z-index:30; display:flex; align-items:center;
    justify-content:space-between; padding:16px 28px 0; pointer-events:none;}
  .island{display:flex; align-items:center; gap:8px; border-radius:999px; padding:4px 12px 4px 4px;
    background:#0A0A0A; border:1px solid rgba(255,159,10,.35);}
  .homebar{position:absolute; left:50%; bottom:8px; transform:translateX(-50%); width:130px; height:5px;
    border-radius:999px; background:rgba(255,255,255,.35); z-index:30; pointer-events:none;}
  .scroll{position:absolute; inset:0; overflow-y:auto; padding:64px 16px 118px;
    scrollbar-width:none; -webkit-overflow-scrolling:touch;}
  .scroll::-webkit-scrollbar{display:none;}
  .scroll.pad0{padding-bottom:28px;}
  .tabwrap{position:absolute; left:16px; right:16px; bottom:18px; z-index:20; display:flex; align-items:center; gap:12px;}

  /* ---- fullscreen (on the iPhone) ---- */
  @media (max-width:500px){
    .stage{padding:0;}
    .phone{width:100%; height:100dvh; border-radius:0; border:0; box-shadow:none;}
    .statusbar,.homebar,.caption{display:none;}
    .scroll{padding-top:calc(env(safe-area-inset-top) + 12px); padding-bottom:calc(env(safe-area-inset-bottom) + 112px);}
    .scroll.pad0{padding-bottom:28px;}
    .tabwrap{bottom:calc(env(safe-area-inset-bottom) + 12px);}
    .sheet{padding-bottom:calc(env(safe-area-inset-bottom) + 26px) !important;}
  }

  /* ---- shared components (mirrors the JSX mockup) ---- */
  .full{min-height:100%; display:flex; flex-direction:column;}
  .rowsb{display:flex; align-items:center; justify-content:space-between;}
  .card{background:var(--card); border-radius:24px; padding:16px;}
  .actcard{display:block; width:100%; border-radius:24px; padding:20px; margin-bottom:16px;}
  .circ{border-radius:50%; display:flex; align-items:center; justify-content:center;}
  .chiprow{display:flex; gap:10px; margin-top:16px;}
  .chip{flex:1; height:44px; border-radius:12px; background:rgba(255,255,255,.06);
    display:flex; align-items:center; justify-content:center;}
  .tabbar{flex:1; display:flex; border-radius:999px; padding:6px; background:rgba(24,24,26,.94);
    border:1px solid rgba(255,255,255,.06); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);}
  .tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; border-radius:999px; padding:6px 0;}
  .tab.on{background:#3A3A3C;}
  .tab .tl{font-size:11px; font-weight:600;}
  .backbtn{display:flex; align-items:center; gap:2px; font-size:17px; font-weight:500; margin:0 0 8px -4px;}
  .bigtimer{font-size:68px; font-weight:700; letter-spacing:-1px;}
  .savebar{width:100%; height:52px; border-radius:16px; font-size:17px; font-weight:700;
    display:flex; align-items:center; justify-content:center; margin-top:32px;}
  .listopt{width:100%; display:flex; align-items:center; justify-content:space-between; padding:16px;}
  .sheetwrap{position:absolute; inset:0; z-index:40; background:rgba(0,0,0,.6);
    display:flex; flex-direction:column; justify-content:flex-end;}
  .sheet{background:var(--card); border-radius:24px 24px 0 0; padding:12px 20px 32px;}
  .grab{width:40px; height:5px; border-radius:99px; background:#3A3A3C; margin:0 auto 16px;}
  .srow{display:flex; align-items:center; justify-content:space-between; padding:14px 16px;}
  .sbtn{width:100%; height:52px; border-radius:16px; font-size:17px; font-weight:600;
    display:flex; align-items:center; justify-content:center;}
  .pulse{animation:pu 1.5s ease-in-out infinite;}
  @keyframes pu{0%,100%{opacity:1}50%{opacity:.35}}
  .ring{position:absolute; inset:-7px; border-radius:50%; pointer-events:none;}
  .tile{width:100%; border-radius:24px; height:116px; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:10px; background:var(--card); border:2px solid transparent;}
  #toast{position:fixed; left:50%; transform:translateX(-50%); bottom:110px; background:#2C2C2E; color:#fff;
    font-size:14px; font-weight:600; padding:10px 18px; border-radius:999px; opacity:0; transition:opacity .25s;
    z-index:60; pointer-events:none;}
  .banner{margin:0 0 14px; padding:10px 14px; border-radius:14px; font-size:13px; line-height:1.4;
    background:rgba(255,159,10,.15); border:1px solid rgba(255,159,10,.4); color:#FFD08A;}
  .hchips{display:flex; flex-wrap:wrap; gap:6px; margin-top:6px;}
  .hchip{font-size:12px; font-weight:600; color:#ddd; background:var(--card2); border-radius:999px; padding:4px 10px;}
  .erow{display:flex; align-items:center; gap:8px; background:var(--card); border-radius:16px;
    padding:0 12px 0 6px; height:64px; margin-bottom:10px;}
  .dragh{width:40px; height:64px; display:flex; align-items:center; justify-content:center;
    touch-action:none; cursor:grab; flex:none;}
  .mvbtn{width:32px; height:32px; border-radius:50%; background:var(--card2);
    display:flex; align-items:center; justify-content:center; flex:none;}
  .ninput{width:100%; background:none; border:0; outline:none; color:#fff; font:inherit;
    font-size:17px; padding:16px; -webkit-appearance:none; border-radius:24px;}
  .ninput::placeholder{color:#5c5c61;}
  .wheelwrap{position:relative; height:180px; overflow:hidden;}
  .wheel,.wcol{height:180px; overflow-y:auto; scrollbar-width:none; scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch;}
  .wheel::-webkit-scrollbar,.wcol::-webkit-scrollbar{display:none;}
  .dtrow{display:flex;}
  .witem{height:36px; line-height:36px; text-align:center; font-size:16px; color:var(--sub);
    scroll-snap-align:center;}
  .witem.on{color:#fff; font-weight:600;}
  .wsel{position:absolute; left:12px; right:12px; top:72px; height:36px; pointer-events:none;
    border-top:1px solid rgba(255,255,255,.18); border-bottom:1px solid rgba(255,255,255,.18);}
  .wfade{position:absolute; left:0; right:0; height:60px; pointer-events:none; z-index:2;}
  .swatch{width:36px; height:36px; border-radius:50%; flex:none;}
  .swatch.on{box-shadow:0 0 0 3px #000, 0 0 0 5px #fff;}
  .icoopt{width:44px; height:44px; border-radius:50%; background:var(--card2);
    display:flex; align-items:center; justify-content:center; flex:none; border:2px solid transparent;}
  .icoopt.on{border-color:#fff;}
  @keyframes wig{0%{rotate:-1deg}50%{rotate:1deg}100%{rotate:-1deg}}
  .wig{animation:wig .3s ease-in-out infinite;}
  .wigmode .actcard{position:relative; transition:transform .22s;}
  .dragging{scale:1.03; box-shadow:0 14px 34px rgba(0,0,0,.55); z-index:10;}
  .delbadge{position:absolute; top:-7px; left:-7px; width:26px; height:26px; border-radius:50%;
    background:#48484A; border:1.5px solid rgba(255,255,255,.28); display:flex; align-items:center;
    justify-content:center; z-index:3;}
  .labar{position:absolute; left:16px; right:16px; bottom:96px; z-index:19; display:flex; align-items:center;
    gap:8px; background:rgba(28,28,30,.96); border:1px solid rgba(255,255,255,.09); border-radius:20px;
    padding:8px 10px; backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);}
  .seg{flex:1; border-radius:999px; padding:8px 0; text-align:center; font-size:14px; font-weight:600;
    color:var(--sub); background:transparent;}
  .seg.on{background:#3A3A3C; color:#fff;}
  .pchip{border-radius:999px; padding:8px 14px; font-size:14px; font-weight:600; background:var(--card2); color:#fff;}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; word-break:break-all;}
  @media (max-width:500px){
    .labar{bottom:calc(env(safe-area-inset-bottom) + 90px);}
  }
</style>
</head>

function isFeed(e){ return e.act==="nursing"||e.act==="expressed"||e.act==="formula"; }
function feedTimes(){
  var out=[], i;
  for(i=0;i<S.entries.length;i++) if(isFeed(S.entries[i])) out.push(new Date(S.entries[i].ts).getTime());
  out.sort(function(a,b){return a-b;});
  return out;
}
function suggSide(){
  for(var i=0;i<S.entries.length;i++){
    var e=S.entries[i];
    if(e.act==="nursing"){
      var d=e.data||{};
      if(d.startSide) return d.startSide==="L"?"Right":"Left";
      if(d.l!=null && d.r!=null) return d.l<=d.r?"Left":"Right";
      break;
    }
  }
  return "Left";
}
function upNext(){
  var f=feedTimes(); if(!f.length) return null;
  var gaps=[], i;
  for(i=Math.max(1,f.length-8); i<f.length; i++){
    var g=f[i]-f[i-1];
    if(g>10*6e4 && g<12*36e5) gaps.push(g);
  }
  var auto=null;
  if(gaps.length){ gaps.sort(function(a,b){return a-b;}); auto=gaps[Math.floor(gaps.length/2)]; }
  var manual=(S.feedIv!=null);
  var iv = manual ? S.feedIv*6e4 : auto;
  return {last:f[f.length-1], med:iv, auto:auto, manual:manual,
    next:(iv ? f[f.length-1]+iv : null), side:suggSide()};
}
function agoStr(ms){
  var m=Math.max(0,Math.round((Date.now()-ms)/6e4));
  if(m<60) return m+"m ago";
  return Math.floor(m/60)+"h "+(m%60)+"m ago";
}
function babyAge(){
  if(!S.baby || !S.baby.dob) return null;
  var d=Math.floor((Date.now()-new Date(S.baby.dob).getTime())/864e5);
  if(d<0) return null;
  if(d<49) return d+" days old";
  var mo=Math.floor(d/30.4375);
  return mo+" mo "+Math.floor(d-mo*30.4375)+" d old";
}
function interp(xs, ys, x){
  if(x<=xs[0]) return ys[0];
  for(var i=1;i<xs.length;i++){
    if(x<=xs[i]){ var f=(x-xs[i-1])/(xs[i]-xs[i-1]); return ys[i-1]+f*(ys[i]-ys[i-1]); }
  }
  return ys[ys.length-1];
}
function growthPts(t){
  var out=[], i;
  if(!S.baby || !S.baby.dob) return out;
  var dob=new Date(S.baby.dob).getTime();
  for(i=S.entries.length-1;i>=0;i--){
    var e=S.entries[i];
    if(e.act==="growth" && e.data && e.data.gtype===t){
      var mo=(new Date(e.ts).getTime()-dob)/(30.4375*864e5);
      if(mo>=0) out.push({mo:mo, v: t==="weight" ? e.data.v/1000 : e.data.v, ts:e.ts});
    }
  }
  out.sort(function(a,b){return a.mo-b.mo;});
  return out;
}
function gChart(t){
  var sex=(S.baby && S.baby.sex==="Boy")?"M":"F";
  var ref=WHO[t][sex], pts=growthPts(t);
  var xmax=24; for(var i=0;i<pts.length;i++) if(pts[i].mo>xmax) xmax=Math.ceil(pts[i].mo);
  var ymin=1e9, ymax=-1e9, j;
  for(j=0;j<WHOAGE.length;j++){ if(WHOAGE[j]<=xmax){ if(ref.p3[j]<ymin)ymin=ref.p3[j]; if(ref.p97[j]>ymax)ymax=ref.p97[j]; } }
  for(j=0;j<pts.length;j++){ if(pts[j].v<ymin)ymin=pts[j].v; if(pts[j].v>ymax)ymax=pts[j].v; }
  var pad=(ymax-ymin)*0.08; ymin-=pad; ymax+=pad;
  var W=330,H=180,L=34,B=20,T=8,R=8;
  function fx(a){ return L+(a/xmax)*(W-L-R); }
  function fy(v){ return T+(1-(v-ymin)/(ymax-ymin))*(H-T-B); }
  function line(ys){
    var p="",k;
    for(k=0;k<WHOAGE.length;k++){ if(WHOAGE[k]>xmax) break;
      p+=(k?" L":"M")+fx(WHOAGE[k]).toFixed(1)+" "+fy(ys[k]).toFixed(1); }
    return p;
  }
  var band=line(ref.p3), k2, rev="";
  for(k2=WHOAGE.length-1;k2>=0;k2--){ if(WHOAGE[k2]>xmax) continue;
    rev+=" L"+fx(WHOAGE[k2]).toFixed(1)+" "+fy(ref.p97[k2]).toFixed(1); }
  var dline="", dots="";
  for(j=0;j<pts.length;j++){
    dline+=(j?" L":"M")+fx(pts[j].mo).toFixed(1)+" "+fy(pts[j].v).toFixed(1);
    dots+='<circle cx="'+fx(pts[j].mo).toFixed(1)+'" cy="'+fy(pts[j].v).toFixed(1)+'" r="3.5" fill="'+C.blue+'"/>';
  }
  var ax="", xs=[0,6,12,18,24];
  for(j=0;j<xs.length;j++){ if(xs[j]<=xmax)
    ax+='<text x="'+fx(xs[j])+'" y="'+(H-5)+'" fill="#8E8E93" font-size="9" text-anchor="middle">'+xs[j]+'m</text>'; }
  ax+='<text x="4" y="'+(fy(ymax-pad)+3)+'" fill="#8E8E93" font-size="9">'+(ymax-pad).toFixed(t==="weight"?1:0)+'</text>';
  ax+='<text x="4" y="'+(fy(ymin+pad)+3)+'" fill="#8E8E93" font-size="9">'+(ymin+pad).toFixed(t==="weight"?1:0)+'</text>';
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block">'+
    '<path d="'+band+rev+' Z" fill="'+alpha(C.blue,0.13)+'"/>'+
    '<path d="'+line(ref.p50)+'" fill="none" stroke="'+alpha(C.blue,0.5)+'" stroke-width="1.5" stroke-dasharray="4 4"/>'+
    (dline?'<path d="'+dline+'" fill="none" stroke="'+C.blue+'" stroke-width="2"/>':"")+dots+ax+'</svg>';
}
function liveSession(){
  var keys=Object.keys(S.sess), best=null, i;
  for(i=0;i<keys.length;i++){
    var k=keys[i], se=S.sess[k], a=act(k);
    if(!a) continue;
    var secs=(a.kind==="dual") ? (dsE(se).l+dsE(se).r) : sE(se);
    if(secs<0.5) continue;
    var o={k:k, a:a, s:se, secs:secs, run:!!se.run};
    if(!best || (o.run && !best.run)) best=o;
  }
  return best;
}

/* ---- generic iOS-style wheel ---- */
function byId(x){ return document.getElementById(x); }
function makeWheel(w, items, startIdx, loop, cb){
  if(!w) return;
  var H=36, N=items.length, reps=loop?3:1, html="", r, i;
  for(r=0;r<reps;r++) for(i=0;i<N;i++) html+='<div class="witem">'+items[i]+'</div>';
  w.innerHTML='<div style="height:72px"></div>'+html+'<div style="height:72px"></div>';
  var t;
  function settle(){
    var j=Math.round(w.scrollTop/H);
    if(loop){
      if(j<N*0.5){ w.scrollTop+=N*H; j+=N; }
      else if(j>N*2.5){ w.scrollTop-=N*H; j-=N; }
    } else { j=Math.max(0, Math.min(N-1, j)); }
    if(Math.abs(w.scrollTop-j*H)>1) w.scrollTop=j*H;
    var its=w.getElementsByClassName("witem");
    for(var q=0;q<its.length;q++) its[q].className="witem"+(q===j?" on":"");
    if(cb) cb(((j%N)+N)%N);
  }
  w.addEventListener("scroll", function(){ clearTimeout(t); t=setTimeout(settle, 90); });
  w.scrollTop=((loop?N:0)+startIdx)*H;
  settle();
}

/* ---- date-time picker (Date | Hour | Min | AM-PM), hour & minute loop infinitely ---- */
var DMAX = 60; /* days back */
function dtPicker(pid){

    '<div class="wcol" id="w_'+pid+'_d" style="flex:1.8"></div>'+

function initDT(pid, defDate, onch){
  var now=new Date(), st=ui.dts[pid];
  if(!st){
    var dd=Math.round((new Date(now.getFullYear(),now.getMonth(),now.getDate()) -
      new Date(defDate.getFullYear(),defDate.getMonth(),defDate.getDate()))/864e5);
    dd=Math.max(0, Math.min(DMAX, dd));
    var h24=defDate.getHours(), h12=h24%12; if(h12===0) h12=12;
    st = ui.dts[pid] = {day:dd, h:h12, m:defDate.getMinutes(), ap:h24>=12?1:0};
  }
  var days=[], i;
  for(i=DMAX;i>=0;i--){
    var d2=new Date(now.getFullYear(), now.getMonth(), now.getDate()-i);
    days.push(i===0?"Today":(i===1?"Yesterday":d2.toLocaleDateString([], {weekday:"short", day:"numeric", month:"short"})));
  }
  var HRS=[], MINS=[];
  for(i=1;i<=12;i++) HRS.push(String(i));
  for(i=0;i<60;i++) MINS.push((i<10?"0":"")+i);
  function ch(){ if(onch) onch(); }
  makeWheel(byId("w_"+pid+"_d"), days, DMAX-st.day, false, function(ix){ st.day=DMAX-ix; ch(); });
  makeWheel(byId("w_"+pid+"_h"), HRS, st.h-1, true,  function(ix){ st.h=ix+1; ch(); });
  makeWheel(byId("w_"+pid+"_m"), MINS, st.m,  true,  function(ix){ st.m=ix; ch(); });
  makeWheel(byId("w_"+pid+"_a"), ["AM","PM"], st.ap, false, function(ix){ st.ap=ix; ch(); });
}
function dtValue(pid){
  var st=ui.dts[pid]; if(!st) return new Date();
  var now=new Date(), h24=(st.h%12)+(st.ap?12:0);
  return new Date(now.getFullYear(), now.getMonth(), now.getDate()-st.day, h24, st.m, 0, 0);
}

var MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function initDOB(){
  var now=new Date(), st=ui.dob;
  if(!st){
    var def = S.baby && S.baby.dob ? new Date(S.baby.dob) : now;
    var h24=def.getHours(), h12=h24%12; if(h12===0) h12=12;
    st = ui.dob = {D:def.getDate(), M:def.getMonth(), Y:def.getFullYear(), h:h12, m:def.getMinutes(), ap:h24>=12?1:0};
  }
  var YRS=[], y0=now.getFullYear()-4, i;
  for(i=y0;i<=now.getFullYear();i++) YRS.push(String(i));
  var DAYS=[], MINS=[], HRS=[];
  for(i=1;i<=31;i++) DAYS.push(String(i));
  for(i=1;i<=12;i++) HRS.push(String(i));
  for(i=0;i<60;i++) MINS.push((i<10?"0":"")+i);
  makeWheel(byId("w_b_D"), DAYS, st.D-1, true, function(ix){ st.D=ix+1; });
  makeWheel(byId("w_b_M"), MONTHS, st.M, true, function(ix){ st.M=ix; });
  makeWheel(byId("w_b_Y"), YRS, Math.max(0, st.Y-y0), false, function(ix){ st.Y=y0+ix; });
  makeWheel(byId("w_b_h"), HRS, st.h-1, true, function(ix){ st.h=ix+1; });
  makeWheel(byId("w_b_m"), MINS, st.m, true, function(ix){ st.m=ix; });
  makeWheel(byId("w_b_a"), ["AM","PM"], st.ap, false, function(ix){ st.ap=ix; });
}
function dobValue(){
  var st=ui.dob; if(!st) return S.baby&&S.baby.dob?new Date(S.baby.dob):new Date();
  var h24=(st.h%12)+(st.ap?12:0);
  var d=new Date(st.Y, st.M, st.D, h24, st.m, 0, 0);
  while(d.getMonth()!==st.M) d.setDate(d.getDate()-1);
  return d;
}

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function alpha(hex,a){ var n=parseInt(hex.slice(1),16);
  return "rgba("+((n>>16)&255)+","+((n>>8)&255)+","+(n&255)+","+a+")"; }
function fmt(sec){ sec=Math.max(0,Math.floor(sec));
  var h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60, p=function(n){return (n<10?"0":"")+n;};
  return h ? h+":"+p(m)+":"+p(s) : p(m)+":"+p(s); }
function fmtMin(sec){ var m=Math.round(sec/60); if(m<60) return m+" min";
  return Math.floor(m/60)+"h "+(m%60)+"m"; }
function tClock(ts){ return new Date(ts).toLocaleTimeString([], {hour:"numeric", minute:"2-digit"}); }
function dayKey(ts){ var d=new Date(ts); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function dayLabel(ts){
  var d=new Date(ts), now=new Date();
  var t=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  var dd=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  var diff=Math.round((t-dd)/864e5);
  if(diff===0) return "Today"; if(diff===1) return "Yesterday";
  return d.toLocaleDateString([], {weekday:"short", day:"numeric", month:"short"});
}

/* timestamp-based sessions: survive locking the phone / app being killed */
function ds(k){ if(!S.sess[k]) S.sess[k]={l:0,r:0,side:null,run:false,at:0}; return S.sess[k]; }
function dsE(s){ var ex=s.run?(Date.now()-s.at)/1000:0;
  return { l:s.l+(s.side==="L"?ex:0), r:s.r+(s.side==="R"?ex:0) }; }
function dsFold(s){ var e=dsE(s); s.l=e.l; s.r=e.r; s.at=Date.now(); }
function ssn(k){ if(!S.sess[k]) S.sess[k]={sec:0,run:false,at:0}; return S.sess[k]; }
function sE(s){ return s.sec+(s.run?(Date.now()-s.at)/1000:0); }
function sFold(s){ s.sec=sE(s); s.at=Date.now(); }
function addEntryAt(k, detail, data, ts){
  S.entries.push({id: Date.now()+Math.floor(Math.random()*1e4), act:k, detail:detail, data:data||{}, ts:ts});
  S.entries.sort(function(x,y){ return x.ts<y.ts ? 1 : (x.ts>y.ts ? -1 : 0); });
  save();
  S.route="list"; S.pmode=false; ui.sheet=false;
  render(); toast("Saved");
}
function addEntry(k, detail, data){ addEntryAt(k, detail, data, new Date().toISOString()); }

/* long-press a card to enter wiggle mode; drag full cards to reorder (iOS style) */
var lpT=null;
document.addEventListener("pointerdown", function(ev){
  if(S.tab!=="activity" || S.route!=="list") return;
  var card = ev.target.closest ? ev.target.closest(".actcard") : null;
  if(!card || (ev.target.closest && ev.target.closest(".delbadge"))) return;
  var sc=byId("scroll");

  /* normal mode: hold ~0.5s without moving -> wiggle mode */
  if(!S.editing){
    var sx=ev.clientX, sy=ev.clientY;
    clearTimeout(lpT);
    var pm=function(e2){ if(Math.abs(e2.clientX-sx)>10 || Math.abs(e2.clientY-sy)>10) cancel(); };
    var cancel=function(){
      clearTimeout(lpT); lpT=null;
      document.removeEventListener("pointermove",pm);
      document.removeEventListener("pointerup",cancel);
      document.removeEventListener("pointercancel",cancel);
    };
    lpT=setTimeout(function(){ cancel(); S.editing=true; render(); }, 500);
    document.addEventListener("pointermove",pm);
    document.addEventListener("pointerup",cancel);
    document.addEventListener("pointercancel",cancel);
    return;
  }

  /* wiggle mode: drag to reorder */
  var wrap=byId("cards"); if(!wrap) return;
  var rows=[].slice.call(wrap.children);
  var idx=rows.indexOf(card); if(idx<0) return;
  var n=rows.length, gap=16, tops=[], hs=[], i;
  for(i=0;i<n;i++){ tops.push(rows[i].offsetTop); hs.push(rows[i].offsetHeight); }
  var slot=hs[idx]+gap;
  var startCY=ev.clientY+sc.scrollTop, lastY=ev.clientY, cur=idx, moved=false;
  card.classList.remove("wig");
  card.classList.add("dragging");
  card.style.transition="none";
  try{ card.setPointerCapture(ev.pointerId); }catch(e0){}
  var block=function(e3){ e3.preventDefault(); };
  window.addEventListener("touchmove", block, {passive:false});
  function upd(){
    var dy=(lastY+sc.scrollTop)-startCY;
    if(Math.abs(dy)>4) moved=true;
    card.style.transform="translateY("+dy+"px)";
    var c=tops[idx]+hs[idx]/2+dy, t=0, j;
    for(j=0;j<n;j++){ if(j===idx) continue; if(c > tops[j]+hs[j]/2) t++; }
    if(t!==cur){
      cur=t;
      for(j=0;j<n;j++){
        if(j===idx) continue;
        var off=0;
        if(idx<cur && j>idx && j<=cur) off=-slot;
        else if(idx>cur && j>=cur && j<idx) off=slot;
        rows[j].style.transform = off ? "translateY("+off+"px)" : "";
      }
    }
  }
  var scInt=setInterval(function(){
    var vh=window.innerHeight;
    if(lastY>vh-110) sc.scrollTop+=7;
    else if(lastY<130) sc.scrollTop-=7;
    else return;
    upd();
  }, 16);
  var pm2=function(e2){ lastY=e2.clientY; upd(); };
  var up2=function(){
    clearInterval(scInt);
    window.removeEventListener("touchmove", block);
    document.removeEventListener("pointermove",pm2);
    document.removeEventListener("pointerup",up2);
    document.removeEventListener("pointercancel",up2);
    if(moved && cur!==idx){
      ensureOrder();
      var o=S.order.splice(idx,1)[0];
      S.order.splice(cur,0,o);
      save();
    }
    render();
  };
  document.addEventListener("pointermove",pm2);
  document.addEventListener("pointerup",up2);
  document.addEventListener("pointercancel",up2);
  ev.preventDefault();
});

/* ============ export ============ */
function today(){ return new Date().toISOString().slice(0,10); }
function buildCsv(){
  var rows=["timestamp,activity,detail,left_sec,right_sec,total_sec,amount,unit,type"];
  for(var i=S.entries.length-1;i>=0;i--){
    var e=S.entries[i], d=e.data||{}, a=act(e.act);
    rows.push([e.ts, a?a.t:e.act, '"'+String(e.detail).replace(/"/g,'""')+'"',
      d.l!=null?d.l:"", d.r!=null?d.r:"", d.total!=null?d.total:(d.sec!=null?d.sec:""),
      d.ml!=null?d.ml:(d.qty!=null?d.qty:(d.v!=null?d.v:"")),
      d.ml!=null?"ml":(d.unit||(d.gtype?(d.gtype==="weight"?"g":"cm"):"")),
      d.type||d.vaccine||d.gtype||""].join(","));
  }
  return rows.join("\n");
}
function exportFile(name, text, type){
  try{
    var blob=new Blob([text],{type:type});
    var file=new File([blob],name,{type:type});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file], title:name}); return;
    }
    var a=document.createElement("a");
    a.href=URL.createObjectURL(blob); a.download=name;
    document.body.appendChild(a); a.click(); a.remove();
  }catch(err){ alert("Export failed: "+err); }
}

/* ============ Trends & predictions ============ */
function last7(){
  var out=[], now=new Date(), t0=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime(), i;
  for(i=6;i>=0;i--){
    var d=new Date(t0-i*864e5);
    out.push({t0:d.getTime(), lbl:"SMTWTFS".charAt(d.getDay()), feeds:0, night:0, nurs:0, sleep:0, longest:0});
  }
  for(i=0;i<S.entries.length;i++){
    var e=S.entries[i], ts=new Date(e.ts).getTime();
    var idx=Math.floor((ts-out[0].t0)/864e5);
    if(idx<0||idx>6) continue;
    var b=out[idx], hr=new Date(e.ts).getHours(), d2=e.data||{};
    if(isFeed(e)){ b.feeds++; if(hr>=22||hr<6) b.night++; }
    if(e.act==="nursing") b.nurs+=(d2.total||0);
    if(e.act==="babysleep"){ b.sleep+=(d2.sec||0); if((d2.sec||0)>b.longest) b.longest=d2.sec; }
  }
  return out;
}
function barsHtml(vals, labels, color, fmtv){
  var m=1, i; for(i=0;i<vals.length;i++) if(vals[i]>m) m=vals[i];
  var h='<div style="display:flex;align-items:flex-end;gap:6px;height:118px;padding-top:4px">';
  for(i=0;i<vals.length;i++){
    h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:5px;height:100%">'+
      '<span class="num" style="font-size:10px;color:var(--sub)">'+(vals[i]?(fmtv?fmtv(vals[i]):vals[i]):"")+'</span>'+
      '<div style="width:16px;border-radius:5px;height:'+Math.max(3,Math.round(vals[i]/m*72))+'px;background:'+
      (i===vals.length-1?color:alpha(color,0.45))+'"></div>'+
      '<span style="font-size:10px;color:var(--sub)">'+labels[i]+'</span></div>';
  }
  return h+'</div>';
}
function stackHtml(day, night, labels){
  var m=1, i; for(i=0;i<day.length;i++) if(day[i]+night[i]>m) m=day[i]+night[i];
  var h='<div style="display:flex;align-items:flex-end;gap:6px;height:118px;padding-top:4px">';
  for(i=0;i<day.length;i++){
    var dh=Math.round(day[i]/m*72), nh=Math.round(night[i]/m*72);
    h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:5px;height:100%">'+
      '<span class="num" style="font-size:10px;color:var(--sub)">'+((day[i]+night[i])||"")+'</span>'+
      '<div style="width:16px;display:flex;flex-direction:column;border-radius:5px;overflow:hidden">'+
      (nh?'<div style="height:'+nh+'px;background:'+C.indigo+'"></div>':"")+
      (dh?'<div style="height:'+dh+'px;background:'+C.orange+'"></div>':"")+
      ((dh+nh)?"":'<div style="height:3px;background:#3A3A3C"></div>')+'</div>'+
      '<span style="font-size:10px;color:var(--sub)">'+labels[i]+'</span></div>';
  }
  return h+'</div>';
}
function clusterInfo(){
  var f=feedTimes(), cut=Date.now()-24*36e5, r=[], i, j;
  for(i=0;i<f.length;i++) if(f[i]>=cut) r.push(f[i]);
  var best=0;
  for(i=0;i<r.length;i++){ j=i; while(j<r.length && r[j]-r[i]<=2*36e5) j++; if(j-i>best) best=j-i; }
  return best;
}

  var w=last7(), labels=w.map(function(x){return x.lbl;});

    '<span style="font-size:11px;color:var(--sub)"><span style="color:'+C.orange+'">\u25CF</span> day 6a\u201310p&nbsp; <span style="color:'+C.indigo+'">\u25CF</span> night</span></div>'+
    stackHtml(w.map(function(x){return x.feeds-x.night;}), w.map(function(x){return x.night;}), labels)+'</div>';
  h += '<div class="card" style="margin-bottom:12px"><div style="font-size:13px;font-weight:600;color:var(--sub)">NURSING MINUTES</div>'+
    barsHtml(w.map(function(x){return Math.round(x.nurs/60);}), labels, C.pink)+'</div>';
  h += '<div class="card" style="margin-bottom:12px"><div style="font-size:13px;font-weight:600;color:var(--sub)">BABY SLEEP \u00B7 HOURS LOGGED</div>'+
    barsHtml(w.map(function(x){return Math.round(x.sleep/360)/10;}), labels, C.lav, function(v){return v;})+'</div>'+

function initVax(){
  var inp=byId("vq"); if(!inp) return;
  function items(){
    var q=(ui.vq||"").trim().toLowerCase(), out=[], i;
    for(i=0;i<VAX.length;i++){
      var v=VAX[i];
      if(!q || (v[0]+" "+v[1]).toLowerCase().indexOf(q)>=0) out.push(v);
    }
    return out;
  }
  function info(){
    var e2=byId("vinfo"); if(!e2) return;
    if(!ui.vax){ e2.innerHTML=""; return; }
    var v=ui.vax, g=null, i;
    for(i=0;i<S.entries.length;i++){
      var en=S.entries[i];
      if(en.act==="vaccine" && en.data && en.data.vaccine===v[0]){ g=en; break; }
    }
    var txt, col;
    if(g){ col=C.green; txt="Given \u2713 \u00B7 "+new Date(g.ts).toLocaleDateString([],{day:"numeric",month:"short",year:"numeric"}); }
    else if(v[2]>=0 && S.baby && S.baby.dob){
      var d=new Date(new Date(S.baby.dob).getTime()+v[2]*864e5);
      col = d.getTime()<Date.now() ? C.orange : "var(--sub)";
      txt = "Due "+d.toLocaleDateString([],{day:"numeric",month:"short",year:"numeric"})+(d.getTime()<Date.now()?" \u00B7 overdue":"");
    }
    else if(v[2]>=0){ col="var(--sub)"; txt="Due at "+v[1]+" \u00B7 set DOB for the exact date"; }
    else { col="var(--sub)"; txt="Optional vaccine"; }
    e2.innerHTML='<div style="text-align:center;font-size:13px;font-weight:600;margin-top:10px;color:'+col+'">'+txt+'</div>';
  }
  function build(){
    var cur=items(), w=byId("vwheel");
    if(!cur.length){
      w.innerHTML='<div style="height:180px;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:14px">No match</div>';
      ui.vax=null; info(); return;
    }
    var labels=[], idx=0, i;
    for(i=0;i<cur.length;i++){
      labels.push(cur[i][0]+" \u2014 "+cur[i][1]);
      if(ui.vax && cur[i][0]===ui.vax[0] && cur[i][1]===ui.vax[1]) idx=i;
    }
    makeWheel(w, labels, idx, cur.length>=8, function(ix){ ui.vax=cur[ix]; info(); });
  }
  inp.value=ui.vq||"";
  inp.addEventListener("input", function(){ ui.vq=inp.value; build(); });
  build();
}

/* ============ render ============ */
function render(){
  sheetHtml="";
  var inSession = (S.tab==="activity" && S.route!=="list") || S.eidx!=null;
  var h;
  if(S.eidx!=null && S.entries[S.eidx]) h = vEdit();
  else if(S.tab==="summary"){
    h = S.sub==="hist" ? vHistory()
      : S.sub==="trends" ? vTrends()
      : S.sub==="baby" ? vBaby()
      : S.sub==="feed" ? vFeed()
      : vSummary();
  }
  else if(S.tab==="sharing") h = vSharing();
  else if(S.route==="new") h = vNew();
  else {
    var a=act(S.route);
    if(!a) h=vList();
    else if(S.pmode) h=vPast(a);
    else if(a.kind==="dual") h=vDual(a);
    else if(a.kind==="single") h=vSingle(a);
    else if(a.kind==="amount") h=vAmount(a);
    else if(a.kind==="supp") h=vSupp(a);
    else if(a.kind==="nappy") h=vNappy(a);
    else if(a.kind==="growth") h=vGrowth(a);
    else if(a.kind==="vax") h=vVax(a);
    else h=vQty(a);
  }
  var sc=document.getElementById("scroll");
  sc.className = "scroll"+(inSession?" pad0":"");
  sc.innerHTML = h;
  if(S.tab==="activity" && S.eidx==null){
    if(S.route==="new") initWheel();
    else {
      var ia=act(S.route);
      if(ia && S.pmode) initDT("p1", new Date());
      else if(ia && ia.kind==="single"){
        initDT("sf", new Date(Date.now()-36e5), refreshSleepLen);
        initDT("sw", new Date(), refreshSleepLen);
        refreshSleepLen();
      }
      else if(ia && ia.kind==="growth") initDT("g1", new Date());
      else if(ia && ia.kind==="vax"){ initVax(); initDT("v1", new Date()); }
    }
  }
  if(S.tab==="summary" && S.sub==="baby") initDOB();
  if(S.eidx!=null && S.entries[S.eidx]){
    var ee=S.entries[S.eidx], ea=act(ee.act);
    if(ea && ea.kind==="single"){
      var wk=new Date(ee.ts), fl=new Date(wk.getTime()-(((ee.data||{}).sec)||0)*1000);
      initDT("sf", fl, refreshSleepLen);
      initDT("sw", wk, refreshSleepLen);
      refreshSleepLen();
    } else {
      initDT("e1", new Date(ee.ts));
    }
  }
  var ls=liveSession();
  document.getElementById("la").innerHTML =
    (ls && S.eidx==null && !S.night && !ui.sheet && !(S.tab==="activity" && S.route===ls.k))
      ? liveBarHtml(ls) : "";
  var tb=document.getElementById("tb");
  tb.style.display = inSession ? "none" : "flex";
  tb.innerHTML = inSession ? "" : tabbarHtml();
  document.getElementById("ov").innerHTML = S.night ? nightHtml() : sheetHtml;
}

byId("impf").addEventListener("change", function(){
  var f=this.files && this.files[0]; if(!f) return;
  var rd=new FileReader();
  rd.onload=function(){
    try{
      var d=JSON.parse(rd.result);
      if(!d || !(d.entries instanceof Array)) throw new Error("no entries array");
      if(!confirm("Import "+d.entries.length+" entries"+(d.baby&&d.baby.dob?" + baby profile":"")+
        "? This replaces the current "+S.entries.length+" entries on this device.")) return;
      S.entries=d.entries; S.custom=d.custom||[]; S.order=d.order||[]; S.baby=d.baby||{};
      S.feedIv=(typeof d.feedIv==="number")?d.feedIv:null;
      S.entries.sort(function(x,y){ return x.ts<y.ts?1:(x.ts>y.ts?-1:0); });
      ensureOrder(); save(); S.tab="summary"; S.sub=""; S.route="list"; render();
      toast("Imported "+S.entries.length+" entries");
    }catch(err){ alert("Couldn\u2019t import that file: "+err.message); }
  };
  rd.readAsText(f);
});

/* Siri via Shortcuts: open the app URL with a #command */
(function(){
  var hsh=(location.hash||"").replace("#","").toLowerCase();
  if(!hsh) return;
  try{ history.replaceState(null,"",location.pathname+location.search); }catch(e){}
  function dual(k, side){
    var se=ds(k); dsFold(se); se.side=side; if(!se.startSide) se.startSide=side;
    se.run=true; se.at=Date.now();
    S.tab="activity"; S.route=k; save();
    setTimeout(function(){ toast("Started "+act(k).t+" ("+(side==="L"?"Left":"Right")+") via Shortcut"); }, 350);
  }
  function single(k){
    var se=ssn(k); se.run=true; se.at=Date.now();
    S.tab="activity"; S.route=k; save();
    setTimeout(function(){ toast("Started "+act(k).t+" via Shortcut"); }, 350);
  }
  if(hsh==="nursing-left") dual("nursing","L");
  else if(hsh==="nursing-right") dual("nursing","R");
  else if(hsh==="pumping-left") dual("pumping","L");
  else if(hsh==="pumping-right") dual("pumping","R");
  else if(hsh==="babysleep") single("babysleep");
  else if(hsh==="mothersleep") single("mothersleep");
})();

render();
</script>
