<style>
  :root{
    --card:#1C1C1E; --card2:#2C2C2E; --hair:#2C2C2E; --sub:#98989F;
    --blue:#3D82F7; --pink:#FF6482; --red:#FF453A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:#0B0B0C; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",sans-serif;
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;}
  button{appearance:none; border:0; background:none; color:inherit; font:inherit; padding:0; text-align:inherit;
    -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; touch-action:manipulation;}
  .press:active{transform:scale(.96); transition:transform .08s;}
  svg{flex:none; display:block;}
  .num{font-variant-numeric:tabular-nums;}

  /* ---- phone frame (desktop / preview) ---- */
  .stage{min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 0;}
  .phone{position:relative; overflow:hidden; width:393px; height:852px; border-radius:54px; background:#000;
    border:1px solid #2A2A2C; box-shadow:0 30px 80px rgba(0,0,0,.7); -webkit-user-select:none; user-select:none;}
  .caption{margin-top:16px; color:#6B6B70; font-size:12px;}
  .statusbar{position:absolute; top:0; left:0; right:0; z-index:30; display:flex; align-items:center;
    justify-content:space-between; padding:16px 28px 0; pointer-events:none;}
  .island{display:flex; align-items:center; gap:8px; border-radius:999px; padding:4px 12px 4px 4px;
    background:#0A0A0A; border:1px solid rgba(255,159,10,.35);}
  .homebar{position:absolute; left:50%; bottom:8px; transform:translateX(-50%); width:130px; height:5px;
    border-radius:999px; background:rgba(255,255,255,.35); z-index:30; pointer-events:none;}
  .scroll{position:absolute; inset:0; overflow-y:auto; padding:64px 16px 118px;
    scrollbar-width:none; -webkit-overflow-scrolling:touch;}
  .scroll::-webkit-scrollbar{display:none;}
  .scroll.pad0{padding-bottom:28px;}
  .tabwrap{position:absolute; left:16px; right:16px; bottom:18px; z-index:20; display:flex; align-items:center; gap:12px;}

  /* ---- fullscreen (on the iPhone) ---- */
  @media (max-width:500px){
    .stage{padding:0;}
    .phone{width:100%; height:100dvh; border-radius:0; border:0; box-shadow:none;}
    .statusbar,.homebar,.caption{display:none;}
    .scroll{padding-top:calc(env(safe-area-inset-top) + 12px); padding-bottom:calc(env(safe-area-inset-bottom) + 112px);}
    .scroll.pad0{padding-bottom:28px;}
    .tabwrap{bottom:calc(env(safe-area-inset-bottom) + 12px);}
    .sheet{padding-bottom:calc(env(safe-area-inset-bottom) + 26px) !important;}
  }

  /* ---- shared components (mirrors the JSX mockup) ---- */
  .full{min-height:100%; display:flex; flex-direction:column;}
  .rowsb{display:flex; align-items:center; justify-content:space-between;}
  .card{background:var(--card); border-radius:24px; padding:16px;}
  .actcard{display:block; width:100%; border-radius:24px; padding:20px; margin-bottom:16px;}
  .circ{border-radius:50%; display:flex; align-items:center; justify-content:center;}
  .chiprow{display:flex; gap:10px; margin-top:16px;}
  .chip{flex:1; height:44px; border-radius:12px; background:rgba(255,255,255,.06);
    display:flex; align-items:center; justify-content:center;}
  .tabbar{flex:1; display:flex; border-radius:999px; padding:6px; background:rgba(24,24,26,.94);
    border:1px solid rgba(255,255,255,.06); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);}
  .tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; border-radius:999px; padding:6px 0;}
  .tab.on{background:#3A3A3C;}
  .tab .tl{font-size:11px; font-weight:600;}
  .backbtn{display:flex; align-items:center; gap:2px; font-size:17px; font-weight:500; margin:0 0 8px -4px;}
  .bigtimer{font-size:68px; font-weight:700; letter-spacing:-1px;}
  .savebar{width:100%; height:52px; border-radius:16px; font-size:17px; font-weight:700;
    display:flex; align-items:center; justify-content:center; margin-top:32px;}
  .listopt{width:100%; display:flex; align-items:center; justify-content:space-between; padding:16px;}
  .sheetwrap{position:absolute; inset:0; z-index:40; background:rgba(0,0,0,.6);
    display:flex; flex-direction:column; justify-content:flex-end;}
  .sheet{background:var(--card); border-radius:24px 24px 0 0; padding:12px 20px 32px;}
  .grab{width:40px; height:5px; border-radius:99px; background:#3A3A3C; margin:0 auto 16px;}
  .srow{display:flex; align-items:center; justify-content:space-between; padding:14px 16px;}
  .sbtn{width:100%; height:52px; border-radius:16px; font-size:17px; font-weight:600;
    display:flex; align-items:center; justify-content:center;}
  .pulse{animation:pu 1.5s ease-in-out infinite;}
  @keyframes pu{0%,100%{opacity:1}50%{opacity:.35}}
  .ring{position:absolute; inset:-7px; border-radius:50%;}
  .tile{width:100%; border-radius:24px; height:116px; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:10px; background:var(--card); border:2px solid transparent;}
  #toast{position:fixed; left:50%; transform:translateX(-50%); bottom:110px; background:#2C2C2E; color:#fff;
    font-size:14px; font-weight:600; padding:10px 18px; border-radius:999px; opacity:0; transition:opacity .25s;
    z-index:60; pointer-events:none;}
  .banner{margin:0 0 14px; padding:10px 14px; border-radius:14px; font-size:13px; line-height:1.4;
    background:rgba(255,159,10,.15); border:1px solid rgba(255,159,10,.4); color:#FFD08A;}
  .hchips{display:flex; flex-wrap:wrap; gap:6px; margin-top:6px;}
  .hchip{font-size:12px; font-weight:600; color:#ddd; background:var(--card2); border-radius:999px; padding:4px 10px;}
</style>
</head>

function fmt(sec){ sec=Math.max(0,Math.floor(sec));
  var h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60, p=function(n){return (n<10?"0":"")+n;};
  return h ? h+":"+p(m)+":"+p(s) : p(m)+":"+p(s); }

  return Math.floor(m/60)+"h "+(m%60)+"m"; }
function tClock(ts){ return new Date(ts).toLocaleTimeString([], {hour:"numeric", minute:"2-digit"}); }
function dayKey(ts){ var d=new Date(ts); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function dayLabel(ts){
  var d=new Date(ts), now=new Date();
  var t=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  var dd=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  var diff=Math.round((t-dd)/864e5);
  if(diff===0) return "Today"; if(diff===1) return "Yesterday";
  return d.toLocaleDateString([], {weekday:"short", day:"numeric", month:"short"});
}
function toast(msg){ var t=document.getElementById("toast"); t.textContent=msg; t.style.opacity="1";
  clearTimeout(t._h); t._h=setTimeout(function(){ t.style.opacity="0"; },1600); }

/* timestamp-based sessions: survive locking the phone / app being killed */
function ds(k){ if(!S.sess[k]) S.sess[k]={l:0,r:0,side:null,run:false,at:0}; return S.sess[k]; }
function dsE(s){ var ex=s.run?(Date.now()-s.at)/1000:0;
  return { l:s.l+(s.side==="L"?ex:0), r:s.r+(s.side==="R"?ex:0) }; }
function dsFold(s){ var e=dsE(s); s.l=e.l; s.r=e.r; s.at=Date.now(); }
function ssn(k){ if(!S.sess[k]) S.sess[k]={sec:0,run:false,at:0}; return S.sess[k]; }
function sE(s){ return s.sec+(s.run?(Date.now()-s.at)/1000:0); }
function sFold(s){ s.sec=sE(s); s.at=Date.now(); }
function addEntry(k, detail, data){
  S.entries.unshift({id:Date.now(), act:k, detail:detail, data:data||{}, ts:new Date().toISOString()});
  save(); S.route="list"; ui.sheet=false; render(); toast("Saved");
}

/* ============ actions ============ */
var A = {
  tab: function(x){ S.tab=x; S.route="list"; S.hist=false; ui.sheet=false; render(); },
  hist: function(){ S.hist=true; render(); },
  histback: function(){ S.hist=false; render(); },
  open: function(x){ S.route=x; ui.sheet=false; ui.sel=null; ui.ml=0; ui.pml=60; render(); },
  back: function(){ S.route="list"; ui.sheet=false; render(); },
  press: function(x){
    var s=ds(S.route);
    if(s.run && s.side===x){ dsFold(s); s.run=false; }
    else { dsFold(s); s.side=x; s.run=true; s.at=Date.now(); }
    save(); render();
  },
  tgl: function(){
    var s=ssn(S.route);
    if(s.run){ sFold(s); s.run=false; } else { s.run=true; s.at=Date.now(); }
    save(); render();
  },
  stop: function(){
    var a=act(S.route);
    if(a.kind==="dual"){ var s=ds(S.route); dsFold(s); s.run=false; if(s.l+s.r>0.5) ui.sheet=true; }
    else { var s2=ssn(S.route); sFold(s2); s2.run=false; if(s2.sec>0.5) ui.sheet=true; }
    save(); render();
  },
  shResume: function(){ ui.sheet=false; render(); },
  shDiscard: function(){
    if(!confirm("Discard this session?")) return;
    delete S.sess[S.route]; ui.sheet=false; save(); S.route="list"; render();
  },
  shSave: function(){
    var a=act(S.route);
    if(a.kind==="dual"){
      var s=ds(a.k), l=Math.round(s.l), r=Math.round(s.r), tot=l+r;
      delete S.sess[a.k];
      if(a.pump) addEntry(a.k, fmt(tot)+" \u00B7 "+ui.pml+" ml collected", {l:l,r:r,total:tot,ml:ui.pml});
      else addEntry(a.k, "L "+fmt(l)+" \u00B7 R "+fmt(r)+" \u00B7 "+fmt(tot)+" total", {l:l,r:r,total:tot});
    } else {
      var s2=ssn(a.k), sec=Math.round(s2.sec);
      delete S.sess[a.k];
      addEntry(a.k, fmt(sec)+" of sleep", {sec:sec});
    }
  },
  ml: function(x){ ui.ml=Math.max(0, ui.ml+(+x)); render(); },
  mlq: function(x){ ui.ml=+x; render(); },
  pml: function(x){ ui.pml=Math.max(0, ui.pml+(+x)); render(); },
  sel: function(x){ ui.sel=x; render(); },
  saveAmount: function(){ if(ui.ml>0) addEntry(S.route, ui.ml+" ml", {ml:ui.ml}); },
  saveSupp: function(){ if(ui.sel) addEntry(S.route, ui.sel, {type:ui.sel}); },
  saveNappy: function(){ if(ui.sel) addEntry(S.route, ui.sel+" nappy", {type:ui.sel}); },
  invite: function(){ toast("Invites aren\u2019t in this test build"); },
  trends: function(){ toast("Trends aren\u2019t in this test build"); },
  srch: function(){ toast("Search isn\u2019t in this test build"); },
  edit: function(){ toast("Editing isn\u2019t in this test build"); },
  expCsv: function(){ exportFile("baby-care-"+today()+".csv", buildCsv(), "text/csv"); },
  expJson: function(){ exportFile("baby-care-"+today()+".json",
    JSON.stringify({exported:new Date().toISOString(), entries:S.entries}, null, 2), "application/json"); },
  clear: function(){
    if(!confirm("Delete ALL "+S.entries.length+" entries and any running sessions? Export first if you need a backup.")) return;
    S.entries=[]; S.sess={}; save(); render(); toast("All data cleared");
  }
};

/* ============ export ============ */
function today(){ return new Date().toISOString().slice(0,10); }
function buildCsv(){
  var rows=["timestamp,activity,detail,left_sec,right_sec,total_sec,amount_ml,type"];
  for(var i=S.entries.length-1;i>=0;i--){
    var e=S.entries[i], d=e.data||{};
    rows.push([e.ts, act(e.act).t, '"'+String(e.detail).replace(/"/g,'""')+'"',
      d.l!=null?d.l:"", d.r!=null?d.r:"", d.total!=null?d.total:(d.sec!=null?d.sec:""),
      d.ml!=null?d.ml:"", d.type||""].join(","));
  }
  return rows.join("\n");
}
function exportFile(name, text, type){
  try{
    var blob=new Blob([text],{type:type});
    var file=new File([blob],name,{type:type});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file], title:name}); return;
    }
    var a=document.createElement("a");
    a.href=URL.createObjectURL(blob); a.download=name;
    document.body.appendChild(a); a.click(); a.remove();
  }catch(err){ alert("Export failed: "+err); }
}

      '<button class="circ press" data-a="pml" data-x="10" style="width:32px;height:32px;background:#3A3A3C">'+ic("plus",16,"#fff")+'</button>'+
      '</span></div>' : "";
    setSheet(a, [["Left",fmt(l)],["Right",fmt(r)],["Total",fmt(l+r)]], extra);
  }
  return h;
}
function vSingle(a){
  var s=ssn(a.k), sec=sE(s);
  var status = s.run ? "Sleeping \u00B7 recording" : (sec>0.5?"Paused":"Tap play when sleep begins");
  var h = '<div class="full">'+timerHead(a, sec, status, s.run)+
    '<span style="position:relative;display:block;margin-top:48px">'+
    (s.run?'<span class="ring pulse" style="inset:-8px;border:2.5px solid '+alpha(a.c,0.6)+'"></span>':"")+
    '<button class="circ press" data-a="tgl" style="width:112px;height:112px;background:'+a.c+'">'+
    (s.run ? ic("pause",42,"#000",{fill:true}) : ic("play",42,"#000",{fill:true,style:"margin-left:5px"}))+
    '</button></span>'+
    stopBtn(sec>0.5)+'</div>';
  if(ui.sheet) setSheet(a, [["Duration",fmt(Math.round(s.sec))],["Ended",tClock(Date.now())]], "");
  return h;
}
var sheetHtml = "";
function setSheet(a, rows, extra){
  var rh="";
  for(var i=0;i<rows.length;i++){
    rh+='<div class="srow" '+(i?'style="border-top:1px solid rgba(0,0,0,.35)"':"")+'>'+
      '<span style="color:var(--sub);font-size:15px">'+rows[i][0]+'</span>'+
      '<span class="num" style="font-size:15px;font-weight:600">'+rows[i][1]+'</span></div>';
  }
  sheetHtml = '<div class="sheetwrap"><div class="sheet"><div class="grab"></div>'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">'+ic(a.icon,22,a.c)+
    '<span style="font-size:20px;font-weight:700">'+a.t+' summary</span></div>'+
    '<div style="background:var(--card2);border-radius:16px;overflow:hidden;margin-bottom:4px">'+rh+'</div>'+extra+
    '<button class="sbtn press" data-a="shSave" style="background:'+a.c+';color:#000;font-weight:700;margin-top:16px">Save to Health</button>'+
    '<button class="sbtn press" data-a="shResume" style="background:var(--card2);margin-top:12px">Resume</button>'+
    '<button class="press" data-a="shDiscard" style="display:block;width:100%;margin-top:16px;color:var(--red);font-size:16px;font-weight:600;text-align:center">Discard session</button>'+
    '</div></div>';
}

/* ============ quick-log screens (mirror JSX) ============ */
function vAmount(a){
  var qs=[30,60,90,120], qh="";
  for(var i=0;i<qs.length;i++){
    var on = ui.ml===qs[i];
    qh+='<button class="press" data-a="mlq" data-x="'+qs[i]+'" style="border-radius:999px;padding:9px 16px;font-size:14px;font-weight:600;'+
      'background:'+(on?a.c:C.card2)+';color:'+(on?"#000":"#fff")+'">'+qs[i]+' ml</button>';
  }
  return '<div class="full" style="padding:0 4px">'+backBtn(a.c)+
    '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:16px">'+
    ic(a.icon,44,a.c)+
    '<div style="font-size:26px;font-weight:700;margin-top:12px">'+a.t+'</div>'+
    '<div style="font-size:14px;color:var(--sub)">'+(a.hint||"")+'</div>'+
    '<div style="display:flex;align-items:baseline;gap:8px;margin-top:40px">'+
    '<span class="num" style="font-size:64px;font-weight:700">'+ui.ml+'</span>'+
    '<span style="font-size:22px;font-weight:600;color:var(--sub)">ml</span></div>'+
    '<div style="display:flex;gap:40px;margin-top:32px">'+
    '<button class="circ press" data-a="ml" data-x="-10" style="width:56px;height:56px;background:var(--card2)">'+ic("minus",24,"#fff")+'</button>'+
    '<button class="circ press" data-a="ml" data-x="10" style="width:56px;height:56px;background:var(--card2)">'+ic("plus",24,"#fff")+'</button></div>'+
    '<div style="display:flex;gap:10px;margin-top:32px">'+qh+'</div></div>'+
    saveBar(a.c, ui.ml>0, "saveAmount")+'</div>';
}
function vSupp(a){
  var oh="";
  for(var i=0;i<SUPPS.length;i++){
    var o=SUPPS[i], on=ui.sel===o;
    oh+='<button class="listopt press" data-a="sel" data-x="'+o+'" '+(i?'style="border-top:1px solid var(--hair)"':"")+'>'+
      '<span style="font-size:16px;font-weight:'+(on?700:400)+'">'+o+'</span>'+(on?ic("check",20,a.c,{sw:3}):"")+'</button>';
  }
  return '<div class="full" style="padding:0 4px">'+backBtn(a.c)+
    '<div style="display:flex;align-items:center;gap:12px;margin:8px 0 24px">'+ic(a.icon,30,a.c)+
    '<span style="font-size:28px;font-weight:700">'+a.t+'</span></div>'+
    '<div class="card" style="padding:0;overflow:hidden">'+oh+'</div>'+
    '<div style="flex:1"></div>'+saveBar(a.c, !!ui.sel, "saveSupp")+'</div>';
}
function vNappy(a){
  var th="";
  for(var i=0;i<NAPPIES.length;i++){
    var t=NAPPIES[i], on=ui.sel===t.n;
    th+='<button class="tile press" data-a="sel" data-x="'+t.n+'" style="'+
      (on?('background:'+alpha(t.c,0.16)+';border-color:'+t.c):"")+'">'+
      ic(t.icon,30,t.c)+'<span style="font-size:15px;font-weight:600">'+t.n+'</span></button>';
  }
  return '<div class="full" style="padding:0 4px">'+backBtn(a.c)+
    '<div style="display:flex;align-items:center;gap:12px;margin:8px 0 4px">'+ic(a.icon,30,a.c)+
    '<span style="font-size:28px;font-weight:700">'+a.t+'</span></div>'+
    '<div style="font-size:14px;color:var(--sub);margin-bottom:24px">What did this change look like?</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+th+'</div>'+
    '<div style="flex:1"></div>'+saveBar(a.c, !!ui.sel, "saveNappy")+'</div>';
}

/* ============ Sharing tab (mirrors JSX) ============ */
function vSharing(){
  var tags=["Nursing","Bottle feeds","Pumping","Sleep","Nappy changes"], th="";
  for(var i=0;i<tags.length;i++)
    th+='<span style="border-radius:999px;padding:6px 14px;background:var(--card2);font-size:13px;font-weight:500">'+tags[i]+'</span>';
  return '<div style="font-size:34px;font-weight:700;letter-spacing:-.5px;padding-top:16px;margin-bottom:20px">Sharing</div>'+
    '<div class="card" style="padding:20px">'+ic("users",34,C.pink)+
    '<div style="font-size:20px;font-weight:700;margin-top:16px">Share Baby Care with your partner</div>'+
    '<div style="margin-top:6px;color:var(--sub);font-size:14px;line-height:1.45">Both of you can start, stop, and log sessions. '+
    'Feeds, sleep, and nappy changes stay in sync across devices.</div>'+
    '<button class="press" data-a="invite" style="display:flex;align-items:center;justify-content:center;width:100%;height:48px;'+
    'border-radius:16px;margin-top:20px;background:'+C.pink+';color:#000;font-size:16px;font-weight:700">Invite a partner</button></div>'+
    '<div class="card" style="padding:20px;margin-top:12px">'+
    '<div style="font-size:16px;font-weight:600;margin-bottom:12px">What gets shared</div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:8px">'+th+'</div></div>';
}

/* ============ tab bar (mirrors JSX: Summary / Activity / Sharing + search) ============ */
function tabbarHtml(){
  var items=[
    {k:"summary", t:"Summary",  icon:"heart", tint:C.blue},
    {k:"activity",t:"Activity", icon:"baby",  tint:C.pink},
    {k:"sharing", t:"Sharing",  icon:"users", tint:"#FFFFFF"}
  ], h='<div class="tabbar">';
  for(var i=0;i<items.length;i++){
    var it=items[i], on=S.tab===it.k;
    h+='<button class="tab press'+(on?" on":"")+'" data-a="tab" data-x="'+it.k+'">'+
      ic(it.icon,22,on?it.tint:"#8E8E93",{sw:2.2, fill:(it.k==="summary"&&on)})+
      '<span class="tl" style="color:'+(on?it.tint:"#8E8E93")+'">'+it.t+'</span></button>';
  }
  h+='</div><button class="circ press" data-a="srch" style="width:48px;height:48px;background:rgba(24,24,26,.94);'+
    'border:1px solid rgba(255,255,255,.06)">'+ic("search",20,"#fff")+'</button>';
  return h;
}

/* ============ render ============ */
function render(){
  sheetHtml="";
  var inSession = S.tab==="activity" && S.route!=="list";
  var h;
  if(S.tab==="summary") h = S.hist ? vHistory() : vSummary();
  else if(S.tab==="sharing") h = vSharing();
  else {
    var a=act(S.route);
    if(!a) h=vList();
    else if(a.kind==="dual") h=vDual(a);
    else if(a.kind==="single") h=vSingle(a);
    else if(a.kind==="amount") h=vAmount(a);
    else if(a.kind==="supp") h=vSupp(a);
    else h=vNappy(a);
  }
  var sc=document.getElementById("scroll");
  sc.className = "scroll"+(inSession?" pad0":"");
  sc.innerHTML = h;
  var tb=document.getElementById("tb");
  tb.style.display = inSession ? "none" : "flex";
  tb.innerHTML = inSession ? "" : tabbarHtml();
  document.getElementById("ov").innerHTML = sheetHtml;
}

/* 1s ticker: targeted text updates so taps aren't interrupted */
setInterval(function(){
  var clk=document.getElementById("clk");
  if(clk) clk.textContent = new Date().toLocaleTimeString([], {hour:"numeric",minute:"2-digit"}).replace(/\s?[AP]M/i,"");
  var a=act(S.route);
  if(!a || S.tab!=="activity") return;
  var tt=document.getElementById("tt");
  if(!tt) return;
  if(a.kind==="dual"){
    var s=S.sess[a.k]; if(!s||!s.run) return;
    var e=dsE(s);
    tt.textContent=fmt(e.l+e.r);
    var L=document.getElementById("tl"), R=document.getElementById("tr");
    if(L) L.textContent=fmt(e.l);
    if(R) R.textContent=fmt(e.r);
  } else if(a.kind==="single"){
    var s2=S.sess[a.k]; if(!s2||!s2.run) return;
    tt.textContent=fmt(sE(s2));
  }
},1000);
document.addEventListener("visibilitychange", function(){ if(!document.hidden) render(); });

/* boot: static status bar icons + first paint */
document.getElementById("isl-ic").innerHTML = ic("baby",13,"#fff",{sw:2.4});
document.getElementById("sb-wifi").innerHTML = ic("wifi",16,"#fff");
load();
render();
</script>
</body>
</html>
