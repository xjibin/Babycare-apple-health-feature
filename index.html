<style>
  :root{
    --card:#1C1C1E; --card2:#2C2C2E; --hair:#2C2C2E; --sub:#98989F;
    --blue:#3D82F7; --pink:#FF6482; --red:#FF453A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:#0B0B0C; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",sans-serif;
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;}
  button{appearance:none; border:0; background:none; color:inherit; font:inherit; padding:0; text-align:inherit;
    -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; touch-action:manipulation;}
  .press:active{transform:scale(.96); transition:transform .08s;}
  svg{flex:none; display:block;}
  .num{font-variant-numeric:tabular-nums;}

  /* ---- phone frame (desktop / preview) ---- */
  .stage{min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 0;}
  .phone{position:relative; overflow:hidden; width:393px; height:852px; border-radius:54px; background:#000;
    border:1px solid #2A2A2C; box-shadow:0 30px 80px rgba(0,0,0,.7); -webkit-user-select:none; user-select:none;}
  .caption{margin-top:16px; color:#6B6B70; font-size:12px;}
  .statusbar{position:absolute; top:0; left:0; right:0; z-index:30; display:flex; align-items:center;
    justify-content:space-between; padding:16px 28px 0; pointer-events:none;}
  .island{display:flex; align-items:center; gap:8px; border-radius:999px; padding:4px 12px 4px 4px;
    background:#0A0A0A; border:1px solid rgba(255,159,10,.35);}
  .homebar{position:absolute; left:50%; bottom:8px; transform:translateX(-50%); width:130px; height:5px;
    border-radius:999px; background:rgba(255,255,255,.35); z-index:30; pointer-events:none;}
  .scroll{position:absolute; inset:0; overflow-y:auto; padding:64px 16px 118px;
    scrollbar-width:none; -webkit-overflow-scrolling:touch;}
  .scroll::-webkit-scrollbar{display:none;}
  .scroll.pad0{padding-bottom:28px;}
  .tabwrap{position:absolute; left:16px; right:16px; bottom:18px; z-index:20; display:flex; align-items:center; gap:12px;}

  /* ---- fullscreen (on the iPhone) ---- */
  @media (max-width:500px){
    .stage{padding:0;}
    .phone{width:100%; height:100dvh; border-radius:0; border:0; box-shadow:none;}
    .statusbar,.homebar,.caption{display:none;}
    .scroll{padding-top:calc(env(safe-area-inset-top) + 12px); padding-bottom:calc(env(safe-area-inset-bottom) + 112px);}
    .scroll.pad0{padding-bottom:28px;}
    .tabwrap{bottom:calc(env(safe-area-inset-bottom) + 12px);}
    .sheet{padding-bottom:calc(env(safe-area-inset-bottom) + 26px) !important;}
  }

  /* ---- shared components (mirrors the JSX mockup) ---- */
  .full{min-height:100%; display:flex; flex-direction:column;}
  .rowsb{display:flex; align-items:center; justify-content:space-between;}
  .card{background:var(--card); border-radius:24px; padding:16px;}
  .actcard{display:block; width:100%; border-radius:24px; padding:20px; margin-bottom:16px;}
  .circ{border-radius:50%; display:flex; align-items:center; justify-content:center;}
  .chiprow{display:flex; gap:10px; margin-top:16px;}
  .chip{flex:1; height:44px; border-radius:12px; background:rgba(255,255,255,.06);
    display:flex; align-items:center; justify-content:center;}
  .tabbar{flex:1; display:flex; border-radius:999px; padding:6px; background:rgba(24,24,26,.94);
    border:1px solid rgba(255,255,255,.06); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);}
  .tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; border-radius:999px; padding:6px 0;}
  .tab.on{background:#3A3A3C;}
  .tab .tl{font-size:11px; font-weight:600;}
  .backbtn{display:flex; align-items:center; gap:2px; font-size:17px; font-weight:500; margin:0 0 8px -4px;}
  .bigtimer{font-size:68px; font-weight:700; letter-spacing:-1px;}
  .savebar{width:100%; height:52px; border-radius:16px; font-size:17px; font-weight:700;
    display:flex; align-items:center; justify-content:center; margin-top:32px;}
  .listopt{width:100%; display:flex; align-items:center; justify-content:space-between; padding:16px;}
  .sheetwrap{position:absolute; inset:0; z-index:40; background:rgba(0,0,0,.6);
    display:flex; flex-direction:column; justify-content:flex-end;}
  .sheet{background:var(--card); border-radius:24px 24px 0 0; padding:12px 20px 32px;}
  .grab{width:40px; height:5px; border-radius:99px; background:#3A3A3C; margin:0 auto 16px;}
  .srow{display:flex; align-items:center; justify-content:space-between; padding:14px 16px;}
  .sbtn{width:100%; height:52px; border-radius:16px; font-size:17px; font-weight:600;
    display:flex; align-items:center; justify-content:center;}
  .pulse{animation:pu 1.5s ease-in-out infinite;}
  @keyframes pu{0%,100%{opacity:1}50%{opacity:.35}}
  .ring{position:absolute; inset:-7px; border-radius:50%;}
  .tile{width:100%; border-radius:24px; height:116px; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:10px; background:var(--card); border:2px solid transparent;}
  #toast{position:fixed; left:50%; transform:translateX(-50%); bottom:110px; background:#2C2C2E; color:#fff;
    font-size:14px; font-weight:600; padding:10px 18px; border-radius:999px; opacity:0; transition:opacity .25s;
    z-index:60; pointer-events:none;}
  .banner{margin:0 0 14px; padding:10px 14px; border-radius:14px; font-size:13px; line-height:1.4;
    background:rgba(255,159,10,.15); border:1px solid rgba(255,159,10,.4); color:#FFD08A;}
  .hchips{display:flex; flex-wrap:wrap; gap:6px; margin-top:6px;}
  .hchip{font-size:12px; font-weight:600; color:#ddd; background:var(--card2); border-radius:999px; padding:4px 10px;}
  .erow{display:flex; align-items:center; gap:8px; background:var(--card); border-radius:16px;
    padding:0 12px 0 6px; height:64px; margin-bottom:10px;}
  .dragh{width:40px; height:64px; display:flex; align-items:center; justify-content:center;
    touch-action:none; cursor:grab; flex:none;}
  .mvbtn{width:32px; height:32px; border-radius:50%; background:var(--card2);
    display:flex; align-items:center; justify-content:center; flex:none;}
  .ninput{width:100%; background:none; border:0; outline:none; color:#fff; font:inherit;
    font-size:17px; padding:16px; -webkit-appearance:none; border-radius:24px;}
  .ninput::placeholder{color:#5c5c61;}
  .wheelwrap{position:relative; height:180px; overflow:hidden;}
  .wheel,.wcol{height:180px; overflow-y:auto; scrollbar-width:none; scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch;}
  .wheel::-webkit-scrollbar,.wcol::-webkit-scrollbar{display:none;}
  .dtrow{display:flex;}
  .witem{height:36px; line-height:36px; text-align:center; font-size:16px; color:var(--sub);
    scroll-snap-align:center;}
  .witem.on{color:#fff; font-weight:600;}
  .wsel{position:absolute; left:12px; right:12px; top:72px; height:36px; pointer-events:none;
    border-top:1px solid rgba(255,255,255,.18); border-bottom:1px solid rgba(255,255,255,.18);}
  .wfade{position:absolute; left:0; right:0; height:60px; pointer-events:none; z-index:2;}
  .swatch{width:36px; height:36px; border-radius:50%; flex:none;}
  .swatch.on{box-shadow:0 0 0 3px #000, 0 0 0 5px #fff;}
  .icoopt{width:44px; height:44px; border-radius:50%; background:var(--card2);
    display:flex; align-items:center; justify-content:center; flex:none; border:2px solid transparent;}
  .icoopt.on{border-color:#fff;}
</style>
</head>

function ensureOrder(){

/* ---- generic iOS-style wheel ---- */
function byId(x){ return document.getElementById(x); }
function makeWheel(w, items, startIdx, loop, cb){
  if(!w) return;
  var H=36, N=items.length, reps=loop?3:1, html="", r, i;
  for(r=0;r<reps;r++) for(i=0;i<N;i++) html+='<div class="witem">'+items[i]+'</div>';
  w.innerHTML='<div style="height:72px"></div>'+html+'<div style="height:72px"></div>';
  var t;
  function settle(){
    var j=Math.round(w.scrollTop/H);
    if(loop){
      if(j<N*0.5){ w.scrollTop+=N*H; j+=N; }
      else if(j>N*2.5){ w.scrollTop-=N*H; j-=N; }
    } else { j=Math.max(0, Math.min(N-1, j)); }
    if(Math.abs(w.scrollTop-j*H)>1) w.scrollTop=j*H;
    var its=w.getElementsByClassName("witem");
    for(var q=0;q<its.length;q++) its[q].className="witem"+(q===j?" on":"");
    if(cb) cb(((j%N)+N)%N);
  }
  w.addEventListener("scroll", function(){ clearTimeout(t); t=setTimeout(settle, 90); });
  w.scrollTop=((loop?N:0)+startIdx)*H;
  settle();
}

/* ---- date-time picker (Date | Hour | Min | AM-PM), hour & minute loop infinitely ---- */
var DMAX = 60; /* days back */
function dtPicker(pid){
  return '<div class="card" style="padding:6px 0"><div class="wheelwrap"><div class="dtrow">'+
    '<div class="wcol" id="w_'+pid+'_d" style="flex:1.8"></div>'+
    '<div class="wcol" id="w_'+pid+'_h" style="flex:.6"></div>'+
    '<div class="wcol" id="w_'+pid+'_m" style="flex:.6"></div>'+
    '<div class="wcol" id="w_'+pid+'_a" style="flex:.8"></div>'+
    '</div><div class="wsel"></div>'+
    '<div class="wfade" style="top:0;background:linear-gradient(#1C1C1E,rgba(28,28,30,0))"></div>'+
    '<div class="wfade" style="bottom:0;background:linear-gradient(rgba(28,28,30,0),#1C1C1E)"></div>'+
    '</div></div>';
}
function initDT(pid, defDate, onch){
  var now=new Date(), st=ui.dts[pid];
  if(!st){
    var dd=Math.round((new Date(now.getFullYear(),now.getMonth(),now.getDate()) -
      new Date(defDate.getFullYear(),defDate.getMonth(),defDate.getDate()))/864e5);
    dd=Math.max(0, Math.min(DMAX, dd));
    var h24=defDate.getHours(), h12=h24%12; if(h12===0) h12=12;
    st = ui.dts[pid] = {day:dd, h:h12, m:defDate.getMinutes(), ap:h24>=12?1:0};
  }
  var days=[], i;
  for(i=DMAX;i>=0;i--){
    var d2=new Date(now.getFullYear(), now.getMonth(), now.getDate()-i);
    days.push(i===0?"Today":(i===1?"Yesterday":d2.toLocaleDateString([], {weekday:"short", day:"numeric", month:"short"})));
  }
  var HRS=[], MINS=[];
  for(i=1;i<=12;i++) HRS.push(String(i));
  for(i=0;i<60;i++) MINS.push((i<10?"0":"")+i);
  function ch(){ if(onch) onch(); }
  makeWheel(byId("w_"+pid+"_d"), days, DMAX-st.day, false, function(ix){ st.day=DMAX-ix; ch(); });
  makeWheel(byId("w_"+pid+"_h"), HRS, st.h-1, true,  function(ix){ st.h=ix+1; ch(); });
  makeWheel(byId("w_"+pid+"_m"), MINS, st.m,  true,  function(ix){ st.m=ix; ch(); });
  makeWheel(byId("w_"+pid+"_a"), ["AM","PM"], st.ap, false, function(ix){ st.ap=ix; ch(); });
}
function dtValue(pid){
  var st=ui.dts[pid]; if(!st) return new Date();
  var now=new Date(), h24=(st.h%12)+(st.ap?12:0);
  return new Date(now.getFullYear(), now.getMonth(), now.getDate()-st.day, h24, st.m, 0, 0);
}

/* timestamp-based sessions: survive locking the phone / app being killed */
function ds(k){ if(!S.sess[k]) S.sess[k]={l:0,r:0,side:null,run:false,at:0}; return S.sess[k]; }
function dsE(s){ var ex=s.run?(Date.now()-s.at)/1000:0;
  return { l:s.l+(s.side==="L"?ex:0), r:s.r+(s.side==="R"?ex:0) }; }
function dsFold(s){ var e=dsE(s); s.l=e.l; s.r=e.r; s.at=Date.now(); }
function ssn(k){ if(!S.sess[k]) S.sess[k]={sec:0,run:false,at:0}; return S.sess[k]; }
function sE(s){ return s.sec+(s.run?(Date.now()-s.at)/1000:0); }
function sFold(s){ s.sec=sE(s); s.at=Date.now(); }
function addEntryAt(k, detail, data, ts){
  S.entries.push({id: Date.now()+Math.floor(Math.random()*1e4), act:k, detail:detail, data:data||{}, ts:ts});
  S.entries.sort(function(x,y){ return x.ts<y.ts ? 1 : (x.ts>y.ts ? -1 : 0); });
  save();
  S.route="list"; S.pmode=false; ui.sheet=false;
  render(); toast("Saved");
}

/* drag-to-reorder in edit mode */
document.addEventListener("pointerdown", function(ev){
  var hnd=ev.target.closest(".dragh");
  if(!hnd) return;
  var row=hnd.closest(".erow"), list=document.getElementById("elist");
  if(!row || !list) return;
  var rows=[].slice.call(list.children);
  var idx=rows.indexOf(row), n=rows.length, slot=row.offsetHeight+10;
  var startY=ev.clientY, cur=idx, moved=false;
  row.style.zIndex="5"; row.style.position="relative"; row.style.transition="none";
  try{ hnd.setPointerCapture(ev.pointerId); }catch(err){}
  function mv(e2){
    var dy=e2.clientY-startY;
    if(Math.abs(dy)>4) moved=true;
    row.style.transform="translateY("+dy+"px)";
    var t2=Math.min(n-1, Math.max(0, idx+Math.round(dy/slot)));
    if(t2!==cur){
      cur=t2;
      for(var i=0;i<n;i++){
        if(i===idx) continue;
        var off=0;
        if(idx<cur && i>idx && i<=cur) off=-slot;
        else if(idx>cur && i>=cur && i<idx) off=slot;
        rows[i].style.transform = off ? "translateY("+off+"px)" : "";
      }
    }
    e2.preventDefault();
  }
  function up(){
    document.removeEventListener("pointermove", mv);
    document.removeEventListener("pointerup", up);
    document.removeEventListener("pointercancel", up);
    if(moved && cur!==idx){
      ensureOrder();
      var o=S.order.splice(idx,1)[0];
      S.order.splice(cur,0,o);
      save();
    }
    render();
  }
  document.addEventListener("pointermove", mv);
  document.addEventListener("pointerup", up);
  document.addEventListener("pointercancel", up);
  ev.preventDefault();
});

/* ============ export ============ */
function today(){ return new Date().toISOString().slice(0,10); }
function buildCsv(){
  var rows=["timestamp,activity,detail,left_sec,right_sec,total_sec,amount,unit,type"];
  for(var i=S.entries.length-1;i>=0;i--){
    var e=S.entries[i], d=e.data||{}, a=act(e.act);
    rows.push([e.ts, a?a.t:e.act, '"'+String(e.detail).replace(/"/g,'""')+'"',
      d.l!=null?d.l:"", d.r!=null?d.r:"", d.total!=null?d.total:(d.sec!=null?d.sec:""),
      d.ml!=null?d.ml:(d.qty!=null?d.qty:""), d.ml!=null?"ml":(d.unit||""), d.type||""].join(","));
  }
  return rows.join("\n");
}
function exportFile(name, text, type){
  try{
    var blob=new Blob([text],{type:type});
    var file=new File([blob],name,{type:type});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file], title:name}); return;
    }
    var a=document.createElement("a");
    a.href=URL.createObjectURL(blob); a.download=name;
    document.body.appendChild(a); a.click(); a.remove();
  }catch(err){ alert("Export failed: "+err); }
}

/* ============ All Health Data (history + export, reached from Summary) ============ */
function vHistory(){
  var h = backBtn(C.blue, "Summary", "histback") +
    '<div style="font-size:34px;font-weight:700;letter-spacing:-.5px;margin-top:4px">All Health Data</div>'+
    '<div style="font-size:13px;color:var(--sub);margin-bottom:14px">'+S.entries.length+
      ' entries \u00B7 stored locally on this device</div>' + bannerHtml();
  if(!S.entries.length){
    h += '<div class="card" style="color:var(--sub);font-size:15px">No entries yet \u2014 your week of data will build up here, grouped by day.</div>';
  } else {
    var groups=[], map={};
    for(var i=0;i<S.entries.length;i++){
      var e=S.entries[i], k=dayKey(e.ts);
      if(!map[k]){ map[k]={ts:e.ts,list:[]}; groups.push(map[k]); }
      map[k].list.push(e);
    }
    for(var g=0;g<groups.length;g++){
      var gr=groups[g], feeds=0, nurs=0, ml=0, nap=0, bs=0, rows="";
      for(var j=0;j<gr.list.length;j++){
        var en=gr.list[j], d=en.data||{};
        if(en.act==="nursing"||en.act==="expressed"||en.act==="formula") feeds++;
        if(en.act==="nursing") nurs+=d.total||0;
        if(d.ml) ml+=d.ml;
        if(en.act==="nappy") nap++;
        if(en.act==="babysleep") bs+=d.sec||0;
        rows+=entryRow(en, j===0);
      }
      var chips="";
      if(feeds) chips+='<span class="hchip">'+feeds+' feeds</span>';
      if(nurs)  chips+='<span class="hchip">Nursing '+fmtMin(nurs)+'</span>';
      if(ml)    chips+='<span class="hchip">'+ml+' ml</span>';
      if(nap)   chips+='<span class="hchip">'+nap+' nappies</span>';
      if(bs)    chips+='<span class="hchip">Baby sleep '+fmtMin(bs)+'</span>';
      h += '<div style="margin:20px 0 10px"><div style="font-size:17px;font-weight:700">'+dayLabel(gr.ts)+
           '</div><div class="hchips">'+chips+'</div></div>'+
           '<div class="card" style="padding:0;overflow:hidden">'+rows+'</div>';
    }
  }
  h += '<div style="font-size:22px;font-weight:700;margin:28px 0 12px">Manage Data</div>'+
    '<div class="card" style="padding:0;overflow:hidden;margin-bottom:12px">'+
    '<button class="listopt press" data-a="expCsv" style="color:var(--blue);font-size:16px">Export as CSV</button>'+
    '<button class="listopt press" data-a="expJson" style="color:var(--blue);font-size:16px;border-top:1px solid var(--hair)">Export as JSON (backup)</button>'+
    '<button class="listopt press" data-a="clear" style="color:var(--red);font-size:16px;border-top:1px solid var(--hair)">Clear All Data</button></div>'+
    '<div style="font-size:13px;color:var(--sub);line-height:1.5;padding:0 4px">Tip for your 1-week test: export a JSON backup every day or two. '+
    'Data survives closing the app and restarting the phone, but clearing Safari website data would erase it.</div>';
  return h;
}

  }
  return '<div class="full" style="padding:0 4px">'+backBtn(a.c)+
    '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:16px">'+
    ic(a.icon,44,a.c)+
    '<div style="font-size:26px;font-weight:700;margin-top:12px">'+a.t+'</div>'+
    '<div style="font-size:14px;color:var(--sub)">'+(a.hint||"")+'</div>'+
    '<div style="display:flex;align-items:baseline;gap:8px;margin-top:40px">'+
    '<span class="num" style="font-size:64px;font-weight:700">'+ui.ml+'</span>'+
    '<span style="font-size:22px;font-weight:600;color:var(--sub)">ml</span></div>'+
    '<div style="display:flex;gap:40px;margin-top:32px">'+
    '<button class="circ press" data-a="ml" data-x="-10" style="width:56px;height:56px;background:var(--card2)">'+ic("minus",24,"#fff")+'</button>'+
    '<button class="circ press" data-a="ml" data-x="10" style="width:56px;height:56px;background:var(--card2)">'+ic("plus",24,"#fff")+'</button></div>'+
    '<div style="display:flex;gap:10px;margin-top:32px">'+qh+'</div>'+pastLink(a)+'</div>'+
    saveBar(a.c, ui.ml>0, "saveAmount")+'</div>';
}
function vSupp(a){
  var oh="";
  for(var i=0;i<SUPPS.length;i++){
    var o=SUPPS[i], on=ui.sel===o;
    oh+='<button class="listopt press" data-a="sel" data-x="'+o+'" '+(i?'style="border-top:1px solid var(--hair)"':"")+'>'+
      '<span style="font-size:16px;font-weight:'+(on?700:400)+'">'+o+'</span>'+(on?ic("check",20,a.c,{sw:3}):"")+'</button>';
  }
  return '<div class="full" style="padding:0 4px">'+backBtn(a.c)+
    '<div style="display:flex;align-items:center;gap:12px;margin:8px 0 24px">'+ic(a.icon,30,a.c)+
    '<span style="font-size:28px;font-weight:700">'+a.t+'</span></div>'+
    '<div class="card" style="padding:0;overflow:hidden">'+oh+'</div>'+pastLink(a)+
    '<div style="flex:1"></div>'+saveBar(a.c, !!ui.sel, "saveSupp")+'</div>';
}
function vNappy(a){
  var th="";
  for(var i=0;i<NAPPIES.length;i++){
    var t=NAPPIES[i], on=ui.sel===t.n;
    th+='<button class="tile press" data-a="sel" data-x="'+t.n+'" style="'+
      (on?('background:'+alpha(t.c,0.16)+';border-color:'+t.c):"")+'">'+
      ic(t.icon,30,t.c)+'<span style="font-size:15px;font-weight:600">'+t.n+'</span></button>';
  }
  return '<div class="full" style="padding:0 4px">'+backBtn(a.c)+
    '<div style="display:flex;align-items:center;gap:12px;margin:8px 0 4px">'+ic(a.icon,30,a.c)+
    '<span style="font-size:28px;font-weight:700">'+a.t+'</span></div>'+
    '<div style="font-size:14px;color:var(--sub);margin-bottom:24px">What did this change look like?</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+th+'</div>'+pastLink(a)+
    '<div style="flex:1"></div>'+saveBar(a.c, !!ui.sel, "saveNappy")+'</div>';
}

/* ============ New Activity (custom card creator) ============ */
function vNew(){
  var i, sw="", io="";
  for(i=0;i<CUSTCOLS.length;i++)
    sw+='<button class="swatch press'+(ui.col===CUSTCOLS[i]?" on":"")+'" data-a="pcol" data-x="'+CUSTCOLS[i]+'" style="background:'+CUSTCOLS[i]+'"></button>';
  for(i=0;i<CUSTICONS.length;i++)
    io+='<button class="icoopt press'+(ui.icon===CUSTICONS[i]?" on":"")+'" data-a="pico" data-x="'+CUSTICONS[i]+'">'+ic(CUSTICONS[i],20,"#fff")+'</button>';
  return '<div class="full" style="padding:0 4px">'+backBtn(C.pink)+
    '<div style="font-size:28px;font-weight:700;margin:8px 0 4px">New Activity</div>'+
    '<div style="font-size:14px;color:var(--sub);margin-bottom:20px">Create a custom card for the Activity screen</div>'+
    '<div style="font-size:13px;font-weight:600;color:var(--sub);letter-spacing:.5px;margin:0 4px 8px">NAME</div>'+
    '<div class="card" style="padding:0;margin-bottom:20px"><input id="nname" class="ninput" maxlength="24" placeholder="e.g. Tummy Time" autocomplete="off" autocapitalize="words"></div>'+
    '<div class="rowsb" style="margin:0 4px 8px">'+
    '<span style="font-size:13px;font-weight:600;color:var(--sub);letter-spacing:.5px">UNIT OF MEASUREMENT</span>'+
    '<span id="usel" style="font-size:13px;font-weight:700;color:'+C.pink+'">'+ui.unit+'</span></div>'+
    '<div class="card" style="padding:6px 0;margin-bottom:20px"><div class="wheelwrap">'+
    '<div class="wheel" id="wheel"></div>'+
    '<div class="wsel"></div>'+
    '<div class="wfade" style="top:0;background:linear-gradient(#1C1C1E,rgba(28,28,30,0))"></div>'+
    '<div class="wfade" style="bottom:0;background:linear-gradient(rgba(28,28,30,0),#1C1C1E)"></div>'+
    '</div></div>'+
    '<div style="font-size:13px;font-weight:600;color:var(--sub);letter-spacing:.5px;margin:0 4px 8px">COLOUR</div>'+
    '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;padding:0 4px">'+sw+'</div>'+
    '<div style="font-size:13px;font-weight:600;color:var(--sub);letter-spacing:.5px;margin:0 4px 8px">ICON</div>'+
    '<div style="display:flex;gap:10px;flex-wrap:wrap;padding:0 4px">'+io+'</div>'+
    '<div style="flex:1;min-height:24px"></div>'+saveBar(C.pink, true, "saveNew", "Add Card")+'</div>';
}
function initWheel(){
  var w=byId("wheel"); if(!w) return;
  makeWheel(w, UNITS, Math.max(0, UNITS.indexOf(ui.unit)), true, function(i){
    ui.unit=UNITS[i];
    var us=byId("usel"); if(us) us.textContent=UNITS[i];
  });
}

/* ============ generic quantity screen for custom cards ============ */
function qbtn(n){
  return '<button class="circ press num" data-a="q" data-x="'+n+'" style="width:56px;height:56px;background:var(--card2);font-size:15px;font-weight:700">'+
    (n>0?"+"+n:String(n))+'</button>';
}
function vQty(a){
  return '<div class="full" style="padding:0 4px">'+backBtn(a.c)+
    '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:16px">'+
    ic(a.icon,44,a.c)+
    '<div style="font-size:26px;font-weight:700;margin-top:12px">'+a.t+'</div>'+
    '<div style="font-size:14px;color:var(--sub)">Logged in '+a.unit+'</div>'+
    '<div style="display:flex;align-items:baseline;gap:8px;margin-top:40px">'+
    '<span class="num" style="font-size:64px;font-weight:700">'+ui.qty+'</span>'+
    '<span style="font-size:22px;font-weight:600;color:var(--sub)">'+a.unit+'</span></div>'+
    '<div style="display:flex;gap:14px;margin-top:32px">'+qbtn(-10)+qbtn(-1)+qbtn(1)+qbtn(10)+'</div>'+pastLink(a)+'</div>'+
    saveBar(a.c, ui.qty>0, "saveQty")+'</div>';
}

/* ============ Add a past entry (adaptive per activity) ============ */
function vPast(a){
  var body="", i;
  if(a.kind==="dual"){
    body = lbl("STARTED AT")+dtPicker("p1")+'<div style="height:16px"></div>'+
      '<div class="card" style="padding:0;overflow:hidden">'+
      (a.pump
        ? stepRow("Duration","pd",ui.pdur,"min",1,5,true)+stepRow("Amount","pml",ui.pml,"ml",10,30,false)
        : stepRow("Left","pl",ui.pl,"min",1,5,true)+stepRow("Right","pr",ui.pr,"min",1,5,false))+
      '</div>';
  } else if(a.kind==="amount"){
    body = lbl("TIME")+dtPicker("p1")+'<div style="height:16px"></div>'+
      '<div class="card" style="padding:0;overflow:hidden">'+stepRow("Amount","ml",ui.ml,"ml",10,30,true)+'</div>';
  } else if(a.kind==="qty"){
    body = lbl("TIME")+dtPicker("p1")+'<div style="height:16px"></div>'+
      '<div class="card" style="padding:0;overflow:hidden">'+stepRow("Amount","q",ui.qty,a.unit,1,10,true)+'</div>';
  } else if(a.kind==="supp"){
    var oh="";
    for(i=0;i<SUPPS.length;i++){
      var o=SUPPS[i], on=ui.sel===o;
      oh+='<button class="listopt press" data-a="sel" data-x="'+o+'" '+(i?'style="border-top:1px solid var(--hair)"':"")+'>'+
        '<span style="font-size:16px;font-weight:'+(on?700:400)+'">'+o+'</span>'+(on?ic("check",20,a.c,{sw:3}):"")+'</button>';
    }
    body = lbl("TIME")+dtPicker("p1")+'<div style="height:16px"></div>'+lbl("TYPE")+
      '<div class="card" style="padding:0;overflow:hidden">'+oh+'</div>';
  } else {
    var th="";
    for(i=0;i<NAPPIES.length;i++){
      var t2=NAPPIES[i], on2=ui.sel===t2.n;
      th+='<button class="tile press" data-a="sel" data-x="'+t2.n+'" style="height:88px;'+
        (on2?('background:'+alpha(t2.c,0.16)+';border-color:'+t2.c):"")+'">'+
        ic(t2.icon,26,t2.c)+'<span style="font-size:14px;font-weight:600">'+t2.n+'</span></button>';
    }
    body = lbl("TIME")+dtPicker("p1")+'<div style="height:16px"></div>'+lbl("STATUS")+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+th+'</div>';
  }
  return '<div class="full" style="padding:0 4px">'+backBtn(a.c, a.t, "pastback")+
    '<div style="font-size:26px;font-weight:700;margin:8px 0 2px">Add a past '+a.t+'</div>'+
    '<div style="font-size:14px;color:var(--sub);margin-bottom:20px">Log one you forgot to record \u00B7 pick the date and time it happened</div>'+
    body+'<div style="flex:1;min-height:20px"></div>'+saveBar(a.c, true, "savePast")+'</div>';
}

/* ============ Sharing tab (mirrors JSX) ============ */
function vSharing(){
  var tags=["Nursing","Bottle feeds","Pumping","Sleep","Nappy changes"], th="";
  for(var i=0;i<tags.length;i++)
    th+='<span style="border-radius:999px;padding:6px 14px;background:var(--card2);font-size:13px;font-weight:500">'+tags[i]+'</span>';
  return '<div style="font-size:34px;font-weight:700;letter-spacing:-.5px;padding-top:16px;margin-bottom:20px">Sharing</div>'+
    '<div class="card" style="padding:20px">'+ic("users",34,C.pink)+
    '<div style="font-size:20px;font-weight:700;margin-top:16px">Share Baby Care with your partner</div>'+
    '<div style="margin-top:6px;color:var(--sub);font-size:14px;line-height:1.45">Both of you can start, stop, and log sessions. '+
    'Feeds, sleep, and nappy changes stay in sync across devices.</div>'+
    '<button class="press" data-a="invite" style="display:flex;align-items:center;justify-content:center;width:100%;height:48px;'+
    'border-radius:16px;margin-top:20px;background:'+C.pink+';color:#000;font-size:16px;font-weight:700">Invite a partner</button></div>'+
    '<div class="card" style="padding:20px;margin-top:12px">'+
    '<div style="font-size:16px;font-weight:600;margin-bottom:12px">What gets shared</div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:8px">'+th+'</div></div>';
}

/* ============ tab bar (mirrors JSX: Summary / Activity / Sharing + search) ============ */
function tabbarHtml(){
  var items=[
    {k:"summary", t:"Summary",  icon:"heart", tint:C.blue},
    {k:"activity",t:"Activity", icon:"baby",  tint:C.pink},
    {k:"sharing", t:"Sharing",  icon:"users", tint:"#FFFFFF"}
  ], h='<div class="tabbar">';
  for(var i=0;i<items.length;i++){
    var it=items[i], on=S.tab===it.k;
    h+='<button class="tab press'+(on?" on":"")+'" data-a="tab" data-x="'+it.k+'">'+
      ic(it.icon,22,on?it.tint:"#8E8E93",{sw:2.2, fill:(it.k==="summary"&&on)})+
      '<span class="tl" style="color:'+(on?it.tint:"#8E8E93")+'">'+it.t+'</span></button>';
  }
  h+='</div><button class="circ press" data-a="srch" style="width:48px;height:48px;background:rgba(24,24,26,.94);'+
    'border:1px solid rgba(255,255,255,.06)">'+ic("search",20,"#fff")+'</button>';
  return h;
}

/* ============ render ============ */
function render(){
  sheetHtml="";
  var inSession = S.tab==="activity" && S.route!=="list";
  var h;
  if(S.tab==="summary") h = S.hist ? vHistory() : vSummary();
  else if(S.tab==="sharing") h = vSharing();
  else if(S.route==="new") h = vNew();
  else {
    var a=act(S.route);
    if(!a) h=vList();
    else if(S.pmode) h=vPast(a);
    else if(a.kind==="dual") h=vDual(a);
    else if(a.kind==="single") h=vSingle(a);
    else if(a.kind==="amount") h=vAmount(a);
    else if(a.kind==="supp") h=vSupp(a);
    else if(a.kind==="nappy") h=vNappy(a);
    else h=vQty(a);
  }
  var sc=document.getElementById("scroll");
  sc.className = "scroll"+(inSession?" pad0":"");
  sc.innerHTML = h;
  if(S.tab==="activity"){
    if(S.route==="new") initWheel();
    else {
      var ia=act(S.route);
      if(ia && S.pmode) initDT("p1", new Date());
      else if(ia && ia.kind==="single"){
        initDT("sf", new Date(Date.now()-36e5), refreshSleepLen);
        initDT("sw", new Date(), refreshSleepLen);
        refreshSleepLen();
      }
    }
  }
  var tb=document.getElementById("tb");
  tb.style.display = inSession ? "none" : "flex";
  tb.innerHTML = inSession ? "" : tabbarHtml();
  document.getElementById("ov").innerHTML = sheetHtml;
}

/* 1s ticker: targeted text updates so taps aren't interrupted */
setInterval(function(){
  var clk=document.getElementById("clk");
  if(clk) clk.textContent = new Date().toLocaleTimeString([], {hour:"numeric",minute:"2-digit"}).replace(/\s?[AP]M/i,"");
  var a=act(S.route);
  if(!a || S.tab!=="activity") return;
  var tt=document.getElementById("tt");
  if(!tt) return;
  if(a.kind==="dual"){
    var s=S.sess[a.k]; if(!s||!s.run) return;
    var e=dsE(s);
    tt.textContent=fmt(e.l+e.r);
    var L=document.getElementById("tl"), R=document.getElementById("tr");
    if(L) L.textContent=fmt(e.l);
    if(R) R.textContent=fmt(e.r);
  } else if(a.kind==="single"){
    var s2=S.sess[a.k]; if(!s2||!s2.run) return;
    tt.textContent=fmt(sE(s2));
  }
},1000);
document.addEventListener("visibilitychange", function(){ if(!document.hidden) render(); });

/* boot: static status bar icons + first paint */
document.getElementById("isl-ic").innerHTML = ic("baby",13,"#fff",{sw:2.4});
document.getElementById("sb-wifi").innerHTML = ic("wifi",16,"#fff");
load();
ensureOrder();
render();
</script>
