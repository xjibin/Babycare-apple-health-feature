    .tabwrap{bottom:calc(max(env(safe-area-inset-bottom), 10px) + 12px);}
    .sheet{padding-bottom:calc(env(safe-area-inset-bottom) + 26px) !important;}
  }

  .full{min-height:100%; display:flex; flex-direction:column;}
  .rowsb{display:flex; align-items:center; justify-content:space-between;}
  .card{background:var(--card); border-radius:24px; padding:16px;}
  .actcard{display:block; width:100%; border-radius:24px; padding:20px; margin-bottom:16px; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;}
  .circ{border-radius:50%; display:flex; align-items:center; justify-content:center;}
  .chiprow{display:flex; gap:10px; margin-top:16px;}
  #cards.grid{display:grid; grid-template-columns:1fr 1fr; gap:14px; align-items:stretch;}
  #cards.grid .actcard{width:auto; margin-bottom:0; padding:16px; border-radius:20px; min-height:152px; display:flex; flex-direction:column;}
  #cards.grid .chiprow{margin-top:auto; padding-top:12px; gap:8px;}
  #cards.grid .chip{height:38px; font-size:12px;}
  .chip{flex:1; height:44px; border-radius:12px; background:rgba(255,255,255,.06);
    display:flex; align-items:center; justify-content:center;}
  .tabbar{flex:1; display:flex; align-items:center; border-radius:999px; padding:6px; background:rgba(24,24,26,.94);
    border:1px solid rgba(255,255,255,.06); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);}
  .tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; border-radius:999px; padding:6px 0;}
  .tab.on{background:#3A3A3C;}
  .tab .tl{font-size:11px; font-weight:600;}
  .backbtn{display:flex; align-items:center; gap:2px; font-size:17px; font-weight:500; margin:0 0 8px -4px;}
  .bigtimer{font-size:68px; font-weight:700; letter-spacing:-1px;}
  .savebar{width:100%; height:56px; border-radius:16px; font-size:17px; font-weight:700;
    display:flex; align-items:center; justify-content:center;}
  .listopt{width:100%; display:flex; align-items:center; justify-content:space-between; padding:16px;}
  .sheetwrap{position:absolute; inset:0; z-index:40; background:rgba(0,0,0,.6);
    display:flex; flex-direction:column; justify-content:flex-end;}
  .sheet{background:var(--card); border-radius:24px 24px 0 0; padding:12px 20px 32px;}
  .grab{width:40px; height:5px; border-radius:99px; background:#3A3A3C; margin:0 auto 16px;}
  .srow{display:flex; align-items:center; justify-content:space-between; padding:14px 16px;}
  .sbtn{width:100%; height:52px; border-radius:16px; font-size:17px; font-weight:600;
    display:flex; align-items:center; justify-content:center;}
  .pulse{animation:pu 1.5s ease-in-out infinite;}
  @keyframes pu{0%,100%{opacity:1}50%{opacity:.35}}
  .ring{position:absolute; inset:-7px; border-radius:50%; pointer-events:none;}
  .tile{width:100%; border-radius:24px; height:116px; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:10px; background:var(--card); border:2px solid transparent;}
  #toast{position:fixed; left:50%; transform:translateX(-50%); bottom:110px; background:#2C2C2E; color:#fff;
    font-size:14px; font-weight:600; padding:10px 18px; border-radius:999px; opacity:0; transition:opacity .25s;
    z-index:60; pointer-events:none;}
  .banner{margin:0 0 14px; padding:10px 14px; border-radius:14px; font-size:13px; line-height:1.4;
    background:rgba(255,159,10,.15); border:1px solid rgba(255,159,10,.4); color:#FFD08A;}
  .hchips{display:flex; flex-wrap:wrap; gap:6px; margin-top:6px;}
  .hchip{font-size:12px; font-weight:600; color:#ddd; background:var(--card2); border-radius:999px; padding:4px 10px;}
  .erow{display:flex; align-items:center; gap:8px; background:var(--card); border-radius:16px;
    padding:0 12px 0 6px; height:64px; margin-bottom:10px;}
  .dragh{width:40px; height:64px; display:flex; align-items:center; justify-content:center;
    touch-action:none; cursor:grab; flex:none;}
  .mvbtn{width:32px; height:32px; border-radius:50%; background:var(--card2);
    display:flex; align-items:center; justify-content:center; flex:none;}
  .ninput{width:100%; background:none; border:0; outline:none; color:#fff; font:inherit;
    font-size:17px; padding:16px; -webkit-appearance:none; border-radius:24px;}
  .ninput::placeholder{color:#5c5c61;}
  .wheelwrap{position:relative; height:180px; overflow:hidden;}
  .wheel,.wcol{height:180px; overflow-y:auto; scrollbar-width:none; scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch;}
  .wheel::-webkit-scrollbar,.wcol::-webkit-scrollbar{display:none;}
  .dtrow{display:flex;}
  .witem{height:36px; line-height:36px; text-align:center; font-size:16px; color:var(--sub);
    scroll-snap-align:center;}
  .witem.on{color:#fff; font-weight:600;}
  .wsel{position:absolute; left:12px; right:12px; top:72px; height:36px; pointer-events:none;
    border-top:1px solid rgba(255,255,255,.18); border-bottom:1px solid rgba(255,255,255,.18);}
  .wfade{position:absolute; left:0; right:0; height:60px; pointer-events:none; z-index:2;}
  .swatch{width:36px; height:36px; border-radius:50%; flex:none;}
  .swatch.on{box-shadow:0 0 0 3px #000, 0 0 0 5px #fff;}
  .icoopt{width:44px; height:44px; border-radius:50%; background:var(--card2);
    display:flex; align-items:center; justify-content:center; flex:none; border:2px solid transparent;}
  .icoopt.on{border-color:#fff;}
  @keyframes wig{0%{rotate:-1deg}50%{rotate:1deg}100%{rotate:-1deg}}
  .wig{animation:wig .3s ease-in-out infinite;}
  .wigmode .actcard{position:relative; transition:transform .22s;}
  .dragging{scale:1.03; box-shadow:0 14px 34px rgba(0,0,0,.55); z-index:10;}
  .delbadge{position:absolute; top:-7px; left:-7px; width:26px; height:26px; border-radius:50%;
    background:#48484A; border:1.5px solid rgba(255,255,255,.28); display:flex; align-items:center;
    justify-content:center; z-index:3;}
  .labar{position:absolute; left:16px; right:16px; bottom:96px; z-index:19; display:flex; align-items:center;
    gap:8px; background:rgba(28,28,30,.96); border:1px solid rgba(255,255,255,.09); border-radius:20px;
    padding:8px 10px; backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);}
  .seg{flex:1; border-radius:999px; padding:8px 0; text-align:center; font-size:14px; font-weight:600;
    color:var(--sub); background:transparent;}
  .seg.on{background:#3A3A3C; color:#fff;}
  .pchip{border-radius:999px; padding:8px 14px; font-size:14px; font-weight:600; background:var(--card2); color:#fff;}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; word-break:break-all;}
  @media (max-width:500px){
    .labar{bottom:calc(env(safe-area-inset-bottom) + 90px);}
  }
.mbcap{display:flex;align-items:center;gap:10px;width:100%;max-width:340px;background:var(--card);border:1px solid var(--hair);border-radius:18px;padding:12px 14px;margin:0 auto;position:relative;overflow:hidden;animation:mbup .35s cubic-bezier(.2,.8,.2,1)}
@keyframes mbup{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.mbfill{position:absolute;left:0;top:0;bottom:0;width:0;background:rgba(192,138,94,.28);animation:asgrow 3s linear forwards}
.asfill{position:absolute;left:0;top:0;bottom:0;width:0;background:rgba(0,0,0,.18);animation:asgrow 3s linear forwards}
@keyframes asgrow{from{width:0}to{width:100%}}
@keyframes hsUp{from{transform:translateY(46%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes hsDown{from{transform:translateY(-46%);opacity:0}to{transform:translateY(0);opacity:1}}

function feedFactorStats(){
  var now=Date.now(), win=now-10*864e5, i, e, t;

  var d0=new Date(); d0.setHours(0,0,0,0); var day0=d0.getTime();
  var napToday=0, napWin=0, napDays={};
  for(i=0;i<S.entries.length;i++){
    e=S.entries[i]; t=new Date(e.ts).getTime();
    if(e.act==="nursing" && e.data && e.data.total && t>=win) durs.push(e.data.total/60);
    if(e.act==="babysleep" && e.data && e.data.sec && t>=win){ var mn=e.data.sec/60; sleeps.push(mn); if(lastSleepEnd==null||t>lastSleepEnd){ lastSleepEnd=t; lastSleepMin=mn; } }
    if(e.act==="nappy"){ if(t>=day0) napToday++; if(t>=win){ napWin++; napDays[new Date(t).toDateString()]=1; } }
  }

}

function feedAdjust(){

    var intake=function(m){ return 1-Math.exp(-m/7); };
    var full=intake(Math.max(s.avgDur,10));
    var ratio=intake(ld)/(full||1);
    x=cl(60*(ratio-1), -22, 8);                      // less milk than a full feed -> hungry sooner; a long comfort feed barely delays

  } else {

  ax+='<text x="4" y="'+(fy(ymax-pad)+3)+'" fill="#8E8E93" font-size="9">'+(ymax-pad).toFixed(t==="weight"?1:0)+'</text>';

/* ---- generic iOS-style wheel ---- */
function byId(x){ return document.getElementById(x); }
function makeWheel(w, items, startIdx, loop, cb){
  if(!w) return;
  var H=36, N=items.length, reps=loop?3:1, html="", r, i;
  for(r=0;r<reps;r++) for(i=0;i<N;i++) html+='<div class="witem">'+items[i]+'</div>';
  w.innerHTML='<div style="height:72px"></div>'+html+'<div style="height:72px"></div>';
  var t;
  function settle(){
    var j=Math.round(w.scrollTop/H);
    if(loop){
      if(j<N*0.5){ w.scrollTop+=N*H; j+=N; }
      else if(j>N*2.5){ w.scrollTop-=N*H; j-=N; }
    } else { j=Math.max(0, Math.min(N-1, j)); }
    if(Math.abs(w.scrollTop-j*H)>1) w.scrollTop=j*H;
    var its=w.getElementsByClassName("witem");
    for(var q=0;q<its.length;q++) its[q].className="witem"+(q===j?" on":"");
    if(cb) cb(((j%N)+N)%N);
  }
  w.addEventListener("scroll", function(){ clearTimeout(t); t=setTimeout(settle, 90); });
  w.scrollTop=((loop?N:0)+startIdx)*H;
  settle();
}

  var cancel=function(){ clearTimeout(holdT2); holdT2=null; document.removeEventListener("pointermove",pm); document.removeEventListener("pointerup",cancel); document.removeEventListener("pointercancel",cancel); };
  holdT2=setTimeout(function(){ cancel(); ui._held=true; var a=el.getAttribute("data-hold"); if(A[a]) A[a](el.getAttribute("data-x")||""); }, 500);

/* long-press a card to enter wiggle mode; drag full cards to reorder (iOS style) */
var lpT=null;
document.addEventListener("pointerdown", function(ev){
  if(S.tab!=="activity" || S.route!=="list") return;
  var card = ev.target.closest ? ev.target.closest(".actcard") : null;
  if(!card || (ev.target.closest && ev.target.closest(".delbadge"))) return;
  var sc=byId("scroll");

  /* normal mode: hold ~0.5s without moving -> wiggle mode */
  if(!S.editing){
    var sx=ev.clientX, sy=ev.clientY;
    clearTimeout(lpT);
    var pm=function(e2){ if(Math.abs(e2.clientX-sx)>10 || Math.abs(e2.clientY-sy)>10) cancel(); };
    var cancel=function(){
      clearTimeout(lpT); lpT=null;
      document.removeEventListener("pointermove",pm);
      document.removeEventListener("pointerup",cancel);
      document.removeEventListener("pointercancel",cancel);
    };
    lpT=setTimeout(function(){ cancel(); S.editing=true; render(); }, 500);
    document.addEventListener("pointermove",pm);
    document.addEventListener("pointerup",cancel);
    document.addEventListener("pointercancel",cancel);
    return;
  }

  /* wiggle mode: drag to reorder */
  var wrap=byId("cards"); if(!wrap) return;
  var rows=[].slice.call(wrap.children);
  var idx=rows.indexOf(card); if(idx<0) return;
  var n=rows.length, gap=16, tops=[], hs=[], i;
  for(i=0;i<n;i++){ tops.push(rows[i].offsetTop); hs.push(rows[i].offsetHeight); }
  var slot=hs[idx]+gap;
  var startCY=ev.clientY+sc.scrollTop, lastY=ev.clientY, cur=idx, moved=false;
  card.classList.remove("wig");
  card.classList.add("dragging");
  card.style.transition="none";
  try{ card.setPointerCapture(ev.pointerId); }catch(e0){}
  var block=function(e3){ e3.preventDefault(); };
  window.addEventListener("touchmove", block, {passive:false});
  function upd(){
    var dy=(lastY+sc.scrollTop)-startCY;
    if(Math.abs(dy)>4) moved=true;
    card.style.transform="translateY("+dy+"px)";
    var c=tops[idx]+hs[idx]/2+dy, t=0, j;
    for(j=0;j<n;j++){ if(j===idx) continue; if(c > tops[j]+hs[j]/2) t++; }
    if(t!==cur){
      cur=t;
      for(j=0;j<n;j++){
        if(j===idx) continue;
        var off=0;
        if(idx<cur && j>idx && j<=cur) off=-slot;
        else if(idx>cur && j>=cur && j<idx) off=slot;
        rows[j].style.transform = off ? "translateY("+off+"px)" : "";
      }
    }
  }
  var scInt=setInterval(function(){
    var vh=window.innerHeight;
    if(lastY>vh-110) sc.scrollTop+=7;
    else if(lastY<130) sc.scrollTop-=7;
    else return;
    upd();
  }, 16);
  var pm2=function(e2){ lastY=e2.clientY; upd(); };
  var up2=function(){
    clearInterval(scInt);
    window.removeEventListener("touchmove", block);
    document.removeEventListener("pointermove",pm2);
    document.removeEventListener("pointerup",up2);
    document.removeEventListener("pointercancel",up2);
    if(moved && cur!==idx){
      ensureOrder();
      var o=S.order.splice(idx,1)[0];
      S.order.splice(cur,0,o);
      save();
    }
    render();
  };
  document.addEventListener("pointermove",pm2);
  document.addEventListener("pointerup",up2);
  document.addEventListener("pointercancel",up2);
  ev.preventDefault();
});

function today(){ return new Date().toISOString().slice(0,10); }
function buildCsv(){
  var rows=["timestamp,activity,detail,left_sec,right_sec,total_sec,amount,unit,type"];
  for(var i=S.entries.length-1;i>=0;i--){
    var e=S.entries[i], d=e.data||{}, a=act(e.act);
    rows.push([e.ts, a?a.t:e.act, '"'+String(e.detail).replace(/"/g,'""')+'"',
      d.l!=null?d.l:"", d.r!=null?d.r:"", d.total!=null?d.total:(d.sec!=null?d.sec:""),
      d.ml!=null?d.ml:(d.qty!=null?d.qty:(d.v!=null?d.v:"")),
      d.ml!=null?"ml":(d.unit||(d.gtype?(d.gtype==="weight"?"g":"cm"):"")),
      d.type||d.vaccine||d.gtype||d.name||""].join(","));
  }
  return rows.join("\n");
}
function exportFile(name, text, type){
  try{
    var blob=new Blob([text],{type:type});
    var file=new File([blob],name,{type:type});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file], title:name}); return;
    }
    var a=document.createElement("a");
    a.href=URL.createObjectURL(blob); a.download=name;
    document.body.appendChild(a); a.click(); a.remove();
  }catch(err){ alert("Export failed: "+err); }
}

function cardChips(a, compact){
  var k=a.k, s=S.sess[k], i;
  function tb(label, actn, x, hl, iconHtml){
    return '<button class="chip press" data-a="'+actn+'" data-x="'+x+'" style="font-size:12px;font-weight:700;color:#fff;padding:0 6px'+
      (hl ? ';border:1.5px solid '+a.c : ';border:1.5px solid transparent')+'">'+(iconHtml||"")+label+'</button>';
  }
  if(compact){
    if(k==="nursing"){ var sg9=suggSide(); return tb("Left","cstart","L",sg9==="Left")+tb("Right","cstart","R",sg9==="Right"); }
    if(k==="nappy") return tb("Wet","qnap","Wet",false)+tb("Mixed","qnap","Mixed",false);
    if(k==="vaccine"){ var VA9=vaxAges(), hv9=""; for(i=0;i<VA9.length&&i<2;i++){ var lb9=VA9[i].lbl.replace(/\s*weeks?/i,"w").replace(/\s*months?/i,"m").replace(/\s*years?/i,"y"); hv9+=tb(lb9,"vgo",String(VA9[i].i),false); } return hv9; }
    if(k==="growth") return tb("Weight","ggo","weight",false);
    return "";
  }
  if(k==="nursing"){
    var sg=suggSide();
    if(sessActive(k)){
      var lL=(s.side==="L") ? ((s.run?"Pause":"Resume")+" left") : "Start left";
      var lR=(s.side==="R") ? ((s.run?"Pause":"Resume")+" right") : "Start right";
      return tb(lL,"cstart","L",false)+tb(lR,"cstart","R",false)+
        tb("Stop & Save","cnstop","nursing",false,
          '<span style="display:inline-flex;margin-right:5px;vertical-align:-1px">'+ic("square",11,a.c,{fill:true})+'</span>');
    }
    return tb("Start left","cstart","L", sg==="Left")+tb("Start right","cstart","R", sg==="Right");
  }
  if(k==="nappy"){
    var NN=["Wet","Mixed","Soiled","Dry"], hn="";
    for(i=0;i<NN.length;i++) hn+=tb(NN[i],"qnap",NN[i],false);
    return hn;
  }
  if(k==="burp"){
    var BB=["Short","Long","Intermittent"], hb="";
    for(i=0;i<BB.length;i++) hb+=tb(BB[i],"qburp",BB[i],false);
    return hb;
  }
  if(k==="babysleep" || k==="mothersleep"){
    var TT=sleepTiers(), hs="";
    for(i=0;i<TT.length;i++) hs+=tb(tierLbl(TT[i]),"qsleep",k+"|"+TT[i],false);
    return hs;
  }
  if(k==="growth"){
    return tb("Add weight","ggo","weight",false)+tb("Add length","ggo","length",false);
  }
  if(k==="vaccine"){
    var VA=vaxAges(), hv="";
    if(VA.length){
      for(i=0;i<VA.length;i++) hv+=tb(VA[i].lbl,"vgo",String(VA[i].i),false);
      return hv;
    }
  }
  if(k==="medicine" && S.meds && S.meds.length){
    var mm=S.meds.slice(-3).reverse(), hm="";
    for(i=0;i<mm.length;i++){
      var nm=(mm[i].name||"Med"); if(nm.length>10) nm=nm.slice(0,10)+"\u2026";
      hm+=tb(nm+" "+(mm[i].ml||"")+"ml","qmed",String(mm[i].id),false);
    }
    return hm;
  }
  var chips=(a.kind==="dual"||a.kind==="single"||a.kind==="burp"||a.kind==="seat")
    ? ["music","mic","timer"] : ["plus","pencil","timer"], hd="";
  for(i=0;i<chips.length;i++) hd+='<span class="chip">'+ic(chips[i],17,"rgba(255,255,255,.55)")+'</span>';
  return hd;
}

function vomHold(){
  var last=null, lt=-1, i;
  for(i=0;i<S.entries.length;i++){ var e=S.entries[i]; if(e.act==="vomit"){ var t=new Date(e.ts).getTime(); if(t>lt){ lt=t; last=e; } } }
  if(!last) return null;
  var d=last.data||{}, forceful=(d.type==="Vomiting"||d.type==="Projectile");
  if(!forceful) return null;
  var mins=(d.type==="Projectile")?45:30, safeAt=lt+mins*6e4;
  if(Date.now()>=safeAt) return null;
  return {safeAt:safeAt, vomTs:lt, type:d.type};
}

/* ============ daily dashboard ============ */
function vDash(){
  var dn=new Date(), tmax=new Date(dn.getFullYear(), dn.getMonth(), dn.getDate()).getTime();
  var tmin=tmax;
  if(S.entries.length){
    var eo=new Date(S.entries[S.entries.length-1].ts);
    tmin=new Date(eo.getFullYear(), eo.getMonth(), eo.getDate()).getTime();
  }
  if(ui.dday==null) ui.dday=tmax;
  if(ui.dday>tmax) ui.dday=tmax;
  if(ui.dday<tmin) ui.dday=tmin;
  var t0=ui.dday, isToday=(t0===tmax), canPrev=(t0>tmin), canNext=(t0<tmax);
  var prevLbl=isToday ? "yesterday" : "previous day";
  var T=dayStats(t0), Y=dayStats(t0-864e5);
  var acts=allActs(), cards="", any=false, i;
  function chip(dir, txt){
    if(dir===null) return '<span style="font-size:11px;color:var(--sub)">no data '+prevLbl+'</span>';
    if(dir===0) return '<span style="font-size:12px;color:var(--sub)">same as '+prevLbl+'</span>';
    return '<span style="font-size:12px;font-weight:600;color:var(--sub)">'+(dir>0?"\u25B2":"\u25BC")+' '+txt+' vs '+prevLbl+'</span>';
  }
  function dnum(tv, yv, f){
    if(yv==null) return chip(null);
    var d=tv-yv;
    if(!d) return chip(0);
    return chip(d>0?1:-1, f(Math.abs(d)));
  }
  for(i=0;i<acts.length;i++){
    var a=acts[i], t=T[a.k], y=Y[a.k];
    if(!t || !t.n) continue;
    any=true;
    var val="", sub="", dch="";
    if(a.kind==="dual" && !a.pump){
      val=fmtMin(t.sec);
      sub=t.n+" session"+(t.n>1?"s":"")+" \u00B7 avg "+fmtMin(t.sec/t.n);
      dch=dnum(t.sec, y?y.sec:null, function(v){return fmtMin(v);});
    } else if(a.pump){
      val=t.ml+" ml";
      sub=t.n+" session"+(t.n>1?"s":"")+" \u00B7 "+fmtMin(t.sec);
      dch=dnum(t.ml, y?y.ml:null, function(v){return v+" ml";});
    } else if(a.kind==="amount"){
      val=t.ml+" ml";
      sub=t.n+" feed"+(t.n>1?"s":"");
      dch=dnum(t.ml, y?y.ml:null, function(v){return v+" ml";});
    } else if(a.kind==="supp"||a.kind==="med"){
      val=t.n+" dose"+(t.n>1?"s":"");
      sub=(a.kind==="med" && t.ml) ? (Math.round(t.ml*10)/10)+" ml total" : "";
      dch=dnum(t.n, y?y.n:null, function(v){return v+" dose"+(v>1?"s":"");});
    } else if(a.kind==="nappy"){
      val=t.wet+" wet \u00B7 "+t.dirty+" dirty";
      sub=t.n+" change"+(t.n>1?"s":"");
      if(!y) dch=chip(null);
      else {
        var dw=t.wet-y.wet, dd2=t.dirty-y.dirty;
        dch = (dw||dd2)
          ? '<span style="font-size:12px;font-weight:600;color:var(--sub)">'+
            (dw?((dw>0?"\u25B2":"\u25BC")+" "+Math.abs(dw)+" wet"):"")+
            (dw&&dd2?" \u00B7 ":"")+
            (dd2?((dd2>0?"\u25B2":"\u25BC")+" "+Math.abs(dd2)+" dirty"):"")+' vs '+prevLbl+'</span>'
          : chip(0);
      }
    } else if(a.kind==="single"||a.kind==="seat"){
      val=(Math.round(t.sec/360)/10)+" h";
      sub=t.n+" session"+(t.n>1?"s":"")+(t.longest?" \u00B7 longest "+fmtMin(t.longest):"");
      dch=dnum(t.sec, y?y.sec:null, function(v){return fmtMin(v);});
    } else if(a.kind==="burp"){
      val=t.n+" burp"+(t.n>1?"s":"");
      sub=fmtMin(t.sec)+" total";
      dch=dnum(t.n, y?y.n:null, function(v){return String(v);});
    } else if(a.kind==="qty"){
      val=t.qty+" "+a.unit;
      sub=t.n+" entr"+(t.n>1?"ies":"y");
      dch=dnum(t.qty, y?y.qty:null, function(v){return v+" "+a.unit;});
    } else if(a.kind==="growth"){
      val=t.items.length+" measurement"+(t.items.length>1?"s":"");
      var gs=[], gi;
      for(gi=0;gi<t.items.length;gi++) gs.push(esc(t.items[gi].detail));
      sub=gs.join(" \u00B7 ");
    } else if(a.kind==="vax"){
      val=t.items.length+" given";
      var vs=[], vi;
      for(vi=0;vi<t.items.length;vi++) vs.push(esc((t.items[vi].data||{}).vaccine||t.items[vi].detail));
      sub=vs.join(" \u00B7 ");
    } else {
      val=t.n+" entr"+(t.n>1?"ies":"y");
    }
    cards+='<div class="card" style="margin-bottom:12px">'+
      '<div class="rowsb"><span style="display:flex;align-items:center;gap:8px">'+ic(a.icon,18,a.c)+
      '<span style="color:'+a.c+';font-size:15px;font-weight:700">'+a.t+'</span></span>'+dch+'</div>'+
      '<div class="num" style="font-size:26px;font-weight:700;margin-top:10px">'+val+'</div>'+
      (sub?'<div style="font-size:13px;color:var(--sub);margin-top:2px">'+sub+'</div>':"")+'</div>';
  }
  return backBtn(C.blue, "Summary", "subback")+
    '<div style="font-size:34px;font-weight:700;letter-spacing:-.5px;margin-top:4px">Daily Dashboard</div>'+
    '<div style="display:flex;align-items:center;gap:10px;margin:14px 0 16px">'+
    '<button class="circ press" data-a="dnav" data-x="-1" '+(canPrev?'':'disabled')+
      ' style="width:34px;height:34px;background:var(--card2);opacity:'+(canPrev?1:0.35)+'">'+ic("chevron-left",16,"#fff")+'</button>'+
    '<span style="flex:1;text-align:center;min-width:0">'+
    '<span style="display:inline-block;background:rgba(10,132,255,.16);color:'+C.blue+';font-weight:800;font-size:17px;padding:6px 18px;border-radius:999px">'+
    dayLabel(new Date(t0).toISOString())+'</span>'+
    '<span style="display:block;font-size:12px;color:var(--sub);margin-top:6px">'+
    new Date(t0).toLocaleDateString([],{weekday:"long", day:"numeric", month:"short"})+
    ' \u00B7 vs '+prevLbl+' \u00B7 swipe \u2190\u2192</span></span>'+
    '<button class="circ press" data-a="dnav" data-x="1" '+(canNext?'':'disabled')+
      ' style="width:34px;height:34px;background:var(--card2);opacity:'+(canNext?1:0.35)+'">'+ic("chevron-right",16,"#fff")+'</button>'+
    '</div>'+
    (any ? cards : '<div class="card" style="color:var(--sub);font-size:15px">Nothing logged on this day.</div>');
}

/* ============ Trends & predictions ============ */
function last7(){
  var out=[], now=new Date(), t0=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime(), i;
  for(i=6;i>=0;i--){
    var d=new Date(t0-i*864e5);
    out.push({t0:d.getTime(), lbl:"SMTWTFS".charAt(d.getDay()), feeds:0, night:0, nurs:0, sleep:0, longest:0});
  }
  for(i=0;i<S.entries.length;i++){
    var e=S.entries[i], ts=new Date(e.ts).getTime();
    var idx=Math.floor((ts-out[0].t0)/864e5);
    if(idx<0||idx>6) continue;
    var b=out[idx], hr=new Date(e.ts).getHours(), d2=e.data||{};
    if(isFeed(e)){ b.feeds++; if(hr>=22||hr<6) b.night++; }
    if(e.act==="nursing") b.nurs+=(d2.total||0);
    if(e.act==="babysleep"){ b.sleep+=(d2.sec||0); if((d2.sec||0)>b.longest) b.longest=d2.sec; }
  }
  return out;
}
function barsHtml(vals, labels, color, fmtv){
  var m=1, i; for(i=0;i<vals.length;i++) if(vals[i]>m) m=vals[i];
  var h='<div style="display:flex;align-items:flex-end;gap:6px;height:118px;padding-top:4px">';
  for(i=0;i<vals.length;i++){
    h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:5px;height:100%">'+
      '<span class="num" style="font-size:10px;color:var(--sub)">'+(vals[i]?(fmtv?fmtv(vals[i]):vals[i]):"")+'</span>'+
      '<div style="width:16px;border-radius:5px;height:'+Math.max(3,Math.round(vals[i]/m*72))+'px;background:'+
      (i===vals.length-1?color:alpha(color,0.45))+'"></div>'+
      '<span style="font-size:10px;color:var(--sub)">'+labels[i]+'</span></div>';
  }
  return h+'</div>';
}
function stackHtml(day, night, labels){
  var m=1, i; for(i=0;i<day.length;i++) if(day[i]+night[i]>m) m=day[i]+night[i];
  var h='<div style="display:flex;align-items:flex-end;gap:6px;height:118px;padding-top:4px">';
  for(i=0;i<day.length;i++){
    var dh=Math.round(day[i]/m*72), nh=Math.round(night[i]/m*72);
    h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:5px;height:100%">'+
      '<span class="num" style="font-size:10px;color:var(--sub)">'+((day[i]+night[i])||"")+'</span>'+
      '<div style="width:16px;display:flex;flex-direction:column;border-radius:5px;overflow:hidden">'+
      (nh?'<div style="height:'+nh+'px;background:'+C.indigo+'"></div>':"")+
      (dh?'<div style="height:'+dh+'px;background:'+C.orange+'"></div>':"")+
      ((dh+nh)?"":'<div style="height:3px;background:#3A3A3C"></div>')+'</div>'+
      '<span style="font-size:10px;color:var(--sub)">'+labels[i]+'</span></div>';
  }
  return h+'</div>';
}
function clusterInfo(){
  var f=feedTimes(), cut=Date.now()-24*36e5, r=[], i, j;
  for(i=0;i<f.length;i++) if(f[i]>=cut) r.push(f[i]);
  var best=0;
  for(i=0;i<r.length;i++){ j=i; while(j<r.length && r[j]-r[i]<=2*36e5) j++; if(j-i>best) best=j-i; }
  return best;
}

function initVax(){
  var inp=byId("vq"); if(!inp) return;
  function items(){
    var q=(ui.vq||"").trim().toLowerCase(), out=[], i;
    for(i=0;i<VAX.length;i++){
      var v=VAX[i];
      if(!q || (v[0]+" "+v[1]).toLowerCase().indexOf(q)>=0) out.push(v);
    }
    return out;
  }
  function info(){
    var e2=byId("vinfo"); if(!e2) return;
    if(!ui.vax){ e2.innerHTML=""; return; }
    var v=ui.vax, g=null, i;
    for(i=0;i<S.entries.length;i++){
      var en=S.entries[i];
      if(en.act==="vaccine" && en.data && en.data.vaccine===v[0]){ g=en; break; }
    }
    var txt, col;
    if(g){ col=C.green; txt="Given \u2713 \u00B7 "+new Date(g.ts).toLocaleDateString([],{day:"numeric",month:"short",year:"numeric"}); }
    else if(v[2]>=0 && S.baby && S.baby.dob){
      var d=new Date(new Date(S.baby.dob).getTime()+v[2]*864e5);
      col = d.getTime()<Date.now() ? C.orange : "var(--sub)";
      txt = "Due "+d.toLocaleDateString([],{day:"numeric",month:"short",year:"numeric"})+(d.getTime()<Date.now()?" \u00B7 overdue":"");
    }
    else if(v[2]>=0){ col="var(--sub)"; txt="Due at "+v[1]+" \u00B7 set DOB for the exact date"; }
    else { col="var(--sub)"; txt="Optional vaccine"; }
    e2.innerHTML='<div style="text-align:center;font-size:13px;font-weight:600;margin-top:10px;color:'+col+'">'+txt+'</div>';
  }
  function build(){
    var cur=items(), w=byId("vwheel");
    if(!cur.length){
      w.innerHTML='<div style="height:180px;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:14px">No match</div>';
      ui.vax=null; info(); return;
    }
    var labels=[], idx=0, i;
    for(i=0;i<cur.length;i++){
      labels.push(cur[i][0]+" \u2014 "+cur[i][1]);
      if(ui.vax && cur[i][0]===ui.vax[0] && cur[i][1]===ui.vax[1]) idx=i;
    }
    makeWheel(w, labels, idx, cur.length>=8, function(ix){ ui.vax=cur[ix]; info(); });
  }
  inp.value=ui.vq||"";
  inp.addEventListener("input", function(){ ui.vq=inp.value; build(); });
  build();
}

function usersList(){
  var map={}, i, n;
  function bump(name, ts){
    if(!name) return;
    if(!map[name] || ts>map[name]) map[name]=ts||0;
  }
  var sm=S.seen||{};   for(n in sm) if(sm.hasOwnProperty(n)) bump(n, sm[n]);
  var rm=S.reads||{};  for(n in rm) if(rm.hasOwnProperty(n)) bump(n, rm[n]);
  for(i=0;i<S.entries.length;i++){
    var e=S.entries[i];
    if(e.by) bump(e.by, new Date(e.ts).getTime());
  }
  for(i=0;i<(S.chat||[]).length;i++){
    var m=S.chat[i];
    if(m.by) bump(m.by, new Date(m.ts).getTime());
  }
  if(S.who) bump(S.who, Date.now());
  var out=[];
  for(n in map) if(map.hasOwnProperty(n)) out.push({n:n, ts:map[n]});
  out.sort(function(a,b){ return b.ts-a.ts; });
  return out;
}

function ggInit(){
  var v=document.getElementById("ggview");
  if(!v || v._gg) return;
  v._gg=1;
  var d0=0, sp0=0, mF=0, px=0, x00=0, lastTap=0, lastDraw=0, moved=false, movedPrev=false;
  function plotX(clientX, r){
    var W=330, L=34, R2=8;
    var rel=(clientX-r.left)/r.width*W;
    var x1=(gg.x1==null?24:gg.x1);
    return gg.x0+((rel-L)/(W-L-R2))*(x1-gg.x0);
  }
  function dist(t){ var dx=t[0].clientX-t[1].clientX, dy=t[0].clientY-t[1].clientY; return Math.sqrt(dx*dx+dy*dy); }
  function draw(){ var now=Date.now(); if(now-lastDraw<30) return; lastDraw=now; ggRedraw(); }
  v.addEventListener("touchstart", function(ev){
    var r=v.getBoundingClientRect();
    if(ev.touches.length===2){
      d0=dist(ev.touches);
      sp0=(gg.x1==null?24:gg.x1)-gg.x0;
      mF=plotX((ev.touches[0].clientX+ev.touches[1].clientX)/2, r);
      x00=gg.x0;
    } else if(ev.touches.length===1){
      var now=Date.now();
      if(now-lastTap<300 && !movedPrev){ gg.x0=0; gg.x1=null; ggRedraw(); }
      lastTap=now; moved=false;
      px=ev.touches[0].clientX; x00=gg.x0; d0=0;
    }
  }, {passive:true});
  v.addEventListener("touchmove", function(ev){
    ev.preventDefault();
    moved=true;
    var r=v.getBoundingClientRect();
    if(ev.touches.length===2 && d0>0){
      var ns=Math.max(0.7, sp0*d0/dist(ev.touches));
      gg.x0=mF-(mF-x00)*(ns/sp0);
      gg.x1=gg.x0+ns;
      draw();
    } else if(ev.touches.length===1 && gg.x1!=null){
      var span=gg.x1-gg.x0;
      var dMo=-(ev.touches[0].clientX-px)/r.width*span*1.15;
      gg.x0=x00+dMo; gg.x1=gg.x0+span;
      draw();
    }
  }, {passive:false});
  v.addEventListener("touchend", function(ev){
    d0=0; movedPrev=moved;
    if(ev.touches.length===1){ px=ev.touches[0].clientX; x00=gg.x0; }
    else if(ev.touches.length===0){ ggRedraw(); }
  }, {passive:true});
}

      for(i=0;i<S.entries.length;i++){ key=S.entries[i].id||(S.entries[i].act+"|"+S.entries[i].ts); have[key]=1; }
      var added=0;
      for(i=0;i<d.entries.length;i++){
        var en=d.entries[i];
        if(!en || !en.act || !en.ts) continue;
        key=en.id||(en.act+"|"+en.ts);
        if(have[key]) continue;
        have[key]=1; S.entries.push(en); added++;
      }
      if((!S.baby || !S.baby.dob) && d.baby && d.baby.dob) S.baby=d.baby;
      S.entries.sort(function(x,y){ return x.ts<y.ts?1:(x.ts>y.ts?-1:0); });
      ensureOrder(); save(); render();
      toast(added ? "Merged "+added+" new entr"+(added===1?"y":"ies") : "Nothing new to merge");
    }catch(err){ alert("Couldn\u2019t merge that file: "+err.message); }
  };
  rd.readAsText(f);
});

/* Siri via Shortcuts: open the app URL with a #command */
(function(){
  var hsh=(location.hash||"").replace("#","").toLowerCase();
  if(!hsh) return;
  try{ history.replaceState(null,"",location.pathname+location.search); }catch(e){}
  function dual(k, side){
    if(k==="nursing") stopSleeps();
    var se=ds(k); dsFold(se); se.side=side; if(!se.startSide) se.startSide=side;
    se.run=true; se.at=Date.now(); if(!se.st) se.st=Date.now();
    S.tab="activity"; S.route=k; save();
    setTimeout(function(){ toast("Started "+act(k).t+" ("+(side==="L"?"Left":"Right")+") via Shortcut"); }, 350);
  }
  function single(k){
    var se=ssn(k); se.run=true; se.at=Date.now(); if(!se.st) se.st=Date.now();
    S.tab="activity"; S.route=k; save();
    setTimeout(function(){ toast("Started "+act(k).t+" via Shortcut"); }, 350);
  }
  if(hsh==="nursing-left") dual("nursing","L");
  else if(hsh==="nursing-right") dual("nursing","R");
  else if(hsh==="pumping-left") dual("pumping","L");
  else if(hsh==="pumping-right") dual("pumping","R");
  else if(hsh==="babysleep") single("babysleep");
  else if(hsh==="mothersleep") single("mothersleep");
})();

setAppIcons();
setTimeout(upCheck, 1200);
setInterval(upCheck, 3e5);
document.addEventListener("visibilitychange", function(){ if(!document.hidden) upCheck(); });
window.addEventListener("pageshow", function(){ upCheck(); });
window.addEventListener("focus", function(){ upCheck(); });
document.addEventListener("touchstart", function(e){
  var h=e.target && e.target.closest ? e.target.closest("#hstack") : null;
  if(h && e.touches && e.touches.length){
    ui._hsy=e.touches[0].clientY; ui._hsxx=e.touches[0].clientX; ui._hsv=false;
  }
}, {passive:true});
document.addEventListener("touchmove", function(e){
  if(ui._hsy==null || !e.touches || !e.touches.length) return;
  var dy=e.touches[0].clientY-ui._hsy, dx=e.touches[0].clientX-ui._hsxx;
  if(!ui._hsv && Math.abs(dy)>10 && Math.abs(dy)>Math.abs(dx)) ui._hsv=true;
  if(ui._hsv && e.cancelable) e.preventDefault();
}, {passive:false});
document.addEventListener("touchend", function(e){
  if(ui._hsy==null) return;
  var y0=ui._hsy; ui._hsy=null;
  if(!e.changedTouches || !e.changedTouches.length) return;
  var dy=e.changedTouches[0].clientY-y0;
  if(Math.abs(dy)<40) return;
  var cs=hsCards(); if(cs.length<2) return;
  var down = dy>0;
  ui.hsIdx=(ui.hsIdx+(down?cs.length-1:1))%cs.length;
  ui.hsHold=Date.now()+15000;
  var el=byId("hstack"); if(el) el.innerHTML=hsCardHtml(down?"down":"up");
}, {passive:false});
var swp={x:0, y:0, started:false};
document.addEventListener("touchstart", function(e){
  swp.started=false;
  if(!e.touches || !e.touches.length) return;
  var t=e.target;
  if(t && t.closest && (t.closest("#hstack") || t.closest("input") || t.closest("textarea") || t.closest("#ggview") || t.closest(".labar"))) return;
  if(ui.sheet || S.eidx!=null || S.night || S.cnight || S.pmode) return;
  swp.x=e.touches[0].clientX; swp.y=e.touches[0].clientY; swp.started=true;
}, {passive:true});
document.addEventListener("touchend", function(e){
  if(!swp.started || !e.changedTouches || !e.changedTouches.length) return;
  swp.started=false;
  if(ui.sheet || S.eidx!=null || S.night || S.cnight) return;
  var dx=e.changedTouches[0].clientX-swp.x, dy=e.changedTouches[0].clientY-swp.y;
  if(Math.abs(dx)<60 || Math.abs(dx)<Math.abs(dy)*1.4) return;
  var TABS=["summary","activity","sharing","chat"];
  var atRoot=(S.tab==="summary" && !S.sub) || (S.tab==="activity" && S.route==="list") || S.tab==="chat" || S.tab==="sharing";
  if(atRoot){
    if(S.tab==="chat" && dx>0){ A.tab("summary"); return; }
    var i=TABS.indexOf(S.tab); if(i<0) return;
    var ni = dx<0 ? i+1 : i-1;
    if(ni<0 || ni>=TABS.length) return;
    A.tab(TABS[ni]);
  } else if(dx>0){
    if(S.tab==="activity" && S.route!=="list") A.back();
    else if(S.tab==="summary" && S.sub && S.sub!=="dash") A.subback();
  }
}, {passive:true});
document.addEventListener("keydown", function(e){
  idleN=0;
  if(e.key==="Enter" && e.target && e.target.id==="chin") A.chatSend();
});
document.addEventListener("touchstart", function(){ idleN=0; }, {passive:true});
document.addEventListener("mousedown", function(){ idleN=0; });
function chFit(){
  var cw=document.getElementById("chwrap");
  if(!cw || S.tab!=="chat") return;
  var sc=document.getElementById("scroll");
  if(sc) sc.scrollTop=0;
  window.scrollTo(0,0);
  var vv=window.visualViewport;
  var kbOpen = !!(vv && (window.innerHeight - vv.height > 80));
  if(!kbOpen){
    cw.style.height = "";
  } else {
    var top=cw.getBoundingClientRect().top - (vv.offsetTop||0);
    if(top<0) top=0;
    cw.style.height = Math.max(240, Math.round(vv.height-top))+"px";
  }
  var cl=document.getElementById("chlist");
  if(cl) cl.scrollTop=1e6;
}
if(window.visualViewport){
  window.visualViewport.addEventListener("resize", chFit);
  window.visualViewport.addEventListener("scroll", chFit);
}
document.addEventListener("focusin", function(e){
  if(e.target && e.target.id==="chin") setTimeout(chFit, 250);
});
(function(){
  var lpT=null, sx=0, sy=0, lk=null, lpAte=0;
  function clearLP(){ if(lpT){ clearTimeout(lpT); lpT=null; } lk=null; }
  document.addEventListener("touchstart", function(e){
    if(S.tab!=="activity" || S.route!=="list" || S.editing) return;
    var c=e.target && e.target.closest ? e.target.closest(".actcard") : null;
    if(!c || !c.getAttribute("data-k")) return;
    lk=c.getAttribute("data-k");
    sx=e.touches[0].clientX; sy=e.touches[0].clientY;
    lpT=setTimeout(function(){
      lpT=null; lpAte=Date.now();
      if(navigator.vibrate) navigator.vibrate(12);
      A.togglehide(lk);
    }, 550);
  }, {passive:true});
  document.addEventListener("touchmove", function(e){
    if(!lpT) return;
    var dx=e.touches[0].clientX-sx, dy=e.touches[0].clientY-sy;
    if(dx*dx+dy*dy>144) clearLP();
  }, {passive:true});
  document.addEventListener("touchend", clearLP);
  document.addEventListener("touchcancel", clearLP);
  document.addEventListener("click", function(e){
    if(lpAte && Date.now()-lpAte<700){ e.stopPropagation(); e.preventDefault(); lpAte=0; }
  }, true);
})();
render();
